// --- js/systems/AudioManager.js ---
class AudioManager {
    constructor() {
        // TTS
        this.synth = window.speechSynthesis || null;
        this.voice = null;
        this.speaking = false;
        if (this.synth) {
            try { this.initVoice(); } catch (e) { /* ignore */ }
        }

        // Speech Recognition
        this.recognition = null;
        this.recognitionSupported = false;
        try { this.initRecognition(); } catch (e) { /* ignore */ }

        // Sound Effects via Web Audio API
        this.audioCtx = null;
        this.sfxEnabled = false;
        try { this.initAudioContext(); } catch (e) { /* ignore */ }
    }

    // ==================== TTS ====================

    initVoice() {
        const loadVoices = () => {
            const voices = this.synth.getVoices();
            if (voices.length === 0) return;
            this.voice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Female'))
                || voices.find(v => v.lang.startsWith('en-US'))
                || voices.find(v => v.lang.startsWith('en'))
                || voices[0];
        };
        loadVoices();
        if (this.synth.onvoiceschanged !== undefined) {
            this.synth.onvoiceschanged = loadVoices;
        }

        // Warm up speech synthesis on first user click
        const warmUp = () => {
            if (!this.voice) loadVoices();
            // Speak a silent utterance to activate audio context
            const u = new SpeechSynthesisUtterance('');
            u.volume = 0;
            u.rate = 2;
            this.synth.speak(u);
            document.removeEventListener('click', warmUp);
            document.removeEventListener('keydown', warmUp);
        };
        document.addEventListener('click', warmUp, { once: true });
        document.addEventListener('keydown', warmUp, { once: true });
    }

    speak(text, rate = 0.85, pitch = 1.3) {
        if (!this.synth) return false;

        // Reload voices on every call (they load async on Mac)
        const voices = this.synth.getVoices();
        if (voices.length > 0) {
            // Prefer cute/higher-pitched voices: Samantha (Mac), Google female, Zira (Win)
            this.voice = voices.find(v => v.name.includes('Samantha'))
                || voices.find(v => v.name.includes('Google') && v.name.includes('Female'))
                || voices.find(v => v.name.includes('Zira'))
                || voices.find(v => v.lang.startsWith('en-US') && v.name.includes('Female'))
                || voices.find(v => v.lang.startsWith('en-US'))
                || voices.find(v => v.lang.startsWith('en'))
                || voices[0];
        }

        this.synth.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        if (this.voice) utterance.voice = this.voice;
        utterance.rate = rate;
        utterance.pitch = pitch;
        utterance.volume = 1.0;

        this.speaking = true;
        utterance.onend = () => { this.speaking = false; };
        utterance.onerror = () => {
            this.speaking = false;
            // Retry once without voice on any error
            if (this.voice) {
                this.voice = null;
                this.synth.cancel();
                const retry = new SpeechSynthesisUtterance(text);
                retry.rate = rate;
                retry.pitch = pitch;
                retry.volume = 1.0;
                retry.onend = () => { this.speaking = false; };
                retry.onerror = () => { this.speaking = false; };
                this.synth.speak(retry);
            }
        };

        this.synth.speak(utterance);
        return true;
    }

    speakWord(word) {
        this.speak(word, 0.8, 1.4);
    }

    speakSentence(sentence) {
        this.speak(sentence, 0.8, 1.2);
    }

    stop() {
        if (this.synth) {
            this.synth.cancel();
            this.speaking = false;
        }
    }

    // ==================== Speech Recognition (跟读) ====================

    initRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            this.recognitionSupported = false;
            return;
        }

        this.recognition = new SpeechRecognition();
        this.recognition.lang = 'en-US';
        this.recognition.interimResults = false;
        this.recognition.maxAlternatives = 3;
        this.recognitionSupported = true;
    }

    listenAndCompare(targetText, onResult) {
        if (!this.recognitionSupported) {
            // Fallback: show alert that device doesn't support
            onResult({ success: false, reason: 'not_supported', message: '你的浏览器不支持语音识别，请使用Chrome浏览器并在localhost或HTTPS下打开' });
            return;
        }

        this.recognition.onresult = (event) => {
            const results = event.results[0];
            const transcripts = [];
            for (let i = 0; i < results.length; i++) {
                transcripts.push(results[i].transcript.toLowerCase().trim());
            }

            const target = targetText.toLowerCase().trim().replace(/[^a-z0-9\s]/g, '');
            const bestMatch = transcripts[0] || '';
            const similarity = this.calculateSimilarity(bestMatch.replace(/[^a-z0-9\s]/g, ''), target);

            const passed = similarity >= 0.6;
            onResult({
                success: true,
                passed: passed,
                similarity: similarity,
                transcript: bestMatch,
                target: targetText,
                message: passed
                    ? `很棒! 相似度: ${Math.round(similarity * 100)}%`
                    : `再试一次~ 你说的是: "${bestMatch}" 相似度: ${Math.round(similarity * 100)}%`
            });
        };

        this.recognition.onerror = (event) => {
            onResult({ success: false, reason: event.error, message: `语音识别出错: ${event.error}` });
        };

        this.recognition.onnomatch = () => {
            onResult({ success: false, reason: 'no_match', message: '没有识别到语音，请再试一次' });
        };

        try {
            this.recognition.start();
        } catch (e) {
            onResult({ success: false, reason: 'error', message: '语音识别启动失败' });
        }
    }

    stopListening() {
        if (this.recognition) {
            try { this.recognition.stop(); } catch (e) { /* ignore */ }
        }
    }

    calculateSimilarity(a, b) {
        if (!a || !b) return 0;
        if (a === b) return 1;

        // Simple word-level similarity
        const wordsA = a.split(/\s+/);
        const wordsB = b.split(/\s+/);
        let matches = 0;
        const setB = new Set(wordsB);
        for (const w of wordsA) {
            if (setB.has(w)) matches++;
        }

        const total = Math.max(wordsA.length, wordsB.length);
        return total > 0 ? matches / total : 0;
    }

    // ==================== Sound Effects ====================

    initAudioContext() {
        try {
            this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            this.sfxEnabled = true;
        } catch (e) {
            this.sfxEnabled = false;
        }
    }

    ensureContext() {
        if (this.audioCtx && this.audioCtx.state === 'suspended') {
            this.audioCtx.resume();
        }
    }

    // Play a simple tone
    playTone(freq, duration, type = 'sine', volume = 0.3) {
        if (!this.sfxEnabled || !this.audioCtx) return;
        this.ensureContext();

        const osc = this.audioCtx.createOscillator();
        const gain = this.audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.audioCtx.currentTime);
        gain.gain.setValueAtTime(volume, this.audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.audioCtx.destination);
        osc.start(this.audioCtx.currentTime);
        osc.stop(this.audioCtx.currentTime + duration);
    }

    sfxJump() {
        this.playTone(400, 0.1, 'square', 0.15);
        setTimeout(() => this.playTone(600, 0.08, 'square', 0.1), 50);
    }

    sfxCoin() {
        this.playTone(988, 0.08, 'square', 0.2);
        setTimeout(() => this.playTone(1319, 0.15, 'square', 0.2), 80);
    }

    sfxCorrect() {
        this.playTone(523, 0.1, 'sine', 0.25);
        setTimeout(() => this.playTone(659, 0.1, 'sine', 0.25), 100);
        setTimeout(() => this.playTone(784, 0.2, 'sine', 0.25), 200);
    }

    sfxWrong() {
        this.playTone(200, 0.2, 'sawtooth', 0.2);
        setTimeout(() => this.playTone(150, 0.3, 'sawtooth', 0.15), 150);
    }

    sfxLevelComplete() {
        const notes = [523, 659, 784, 1047];
        notes.forEach((freq, i) => {
            setTimeout(() => this.playTone(freq, 0.2, 'sine', 0.25), i * 150);
        });
    }

    sfxHit() {
        this.playTone(300, 0.08, 'triangle', 0.2);
    }

    sfxStomp() {
        this.playTone(200, 0.1, 'square', 0.3);
        setTimeout(() => this.playTone(100, 0.15, 'square', 0.2), 50);
    }
}

let audioManager;


// --- js/systems/ProgressManager.js ---
// ProgressManager - localStorage progress tracking
class ProgressManager {
    constructor() {
        this.progress = this.loadProgress();
    }

    getDefaultProgress() {
        return {
            currentWorld: 1,
            currentLevel: 1,
            worlds: {
                1: { unlocked: true, levels: { 1: { stars: 0, completed: false }, 2: { stars: 0, completed: false }, 3: { stars: 0, completed: false }, boss: { stars: 0, completed: false } } },
                2: { unlocked: false, levels: { 1: { stars: 0, completed: false }, 2: { stars: 0, completed: false }, 3: { stars: 0, completed: false }, boss: { stars: 0, completed: false } } },
                3: { unlocked: false, levels: { 1: { stars: 0, completed: false }, 2: { stars: 0, completed: false }, 3: { stars: 0, completed: false }, boss: { stars: 0, completed: false } } },
                4: { unlocked: false, levels: { 1: { stars: 0, completed: false }, 2: { stars: 0, completed: false }, 3: { stars: 0, completed: false }, boss: { stars: 0, completed: false } } },
                5: { unlocked: false, levels: { 1: { stars: 0, completed: false }, 2: { stars: 0, completed: false }, 3: { stars: 0, completed: false }, boss: { stars: 0, completed: false } } },
                6: { unlocked: false, levels: { 1: { stars: 0, completed: false }, 2: { stars: 0, completed: false }, 3: { stars: 0, completed: false }, boss: { stars: 0, completed: false } } }
            }
        };
    }

    loadProgress() {
        try {
            const saved = JSON.parse(localStorage.getItem('gameProgress'));
            return saved || this.getDefaultProgress();
        } catch {
            return this.getDefaultProgress();
        }
    }

    saveProgress() {
        try {
            localStorage.setItem('gameProgress', JSON.stringify(this.progress));
        } catch { /* storage full */ }
    }

    completeLevel(world, level, stars) {
        if (!this.progress.worlds[world]) return;
        this.progress.worlds[world].levels[level].completed = true;
        this.progress.worlds[world].levels[level].stars = Math.max(
            this.progress.worlds[world].levels[level].stars,
            stars
        );

        // Unlock next level or world
        if (level === 'boss') {
            // Unlock next world
            const nextWorld = world + 1;
            if (this.progress.worlds[nextWorld]) {
                this.progress.worlds[nextWorld].unlocked = true;
            }
        } else {
            // Unlock next level
            const nextLevel = level + 1;
            if (this.progress.worlds[world].levels[nextLevel]) {
                this.progress.worlds[world].levels[nextLevel].unlocked = true;
            }
        }

        this.progress.currentWorld = world;
        this.progress.currentLevel = level;
        this.saveProgress();
    }

    getLevelStars(world, level) {
        return this.progress.worlds[world]?.levels[level]?.stars || 0;
    }

    isLevelUnlocked(world, level) {
        return this.progress.worlds[world]?.unlocked
            && this.progress.worlds[world]?.levels[level]?.unlocked !== false;
    }

    resetProgress() {
        this.progress = this.getDefaultProgress();
        this.saveProgress();
    }
}

// --- js/systems/QuizManager.js ---
class QuizManager {
    constructor(unitData) {
        this.unitData = unitData;
        this.wrongAnswers = this.loadWrongAnswers();
        this.usedQuestions = [];
    }

    generateQuestion(type) {
        if (!this.unitData) {
            return this.fallbackQuestion();
        }

        let question;
        switch (type) {
            case 'vocabulary':
                question = this.generateVocabQuestion();
                break;
            case 'listening':
                question = this.generateListeningQuestion();
                break;
            case 'sentence':
                question = this.generateSentenceQuestion();
                break;
            case 'grammar':
                question = this.generateGrammarQuestion();
                break;
            case 'phonics':
                question = this.generatePhonicsQuestion();
                break;
            case 'spelling':
                question = this.generateSpellingQuestion();
                break;
            case 'cloze':
                question = this.generateClozeQuestion();
                break;
            default:
                question = this.generateVocabQuestion();
        }

        // Mix in review question occasionally (30% chance if reviews available)
        if (Math.random() < 0.3) {
            const reviews = this.getReviewQuestions(1);
            if (reviews.length > 0) {
                const rd = reviews[0].data;
                if (rd && rd.type && rd.question && Array.isArray(rd.choices) && rd.correctIndex !== undefined) {
                    question = rd;
                    question.isReview = true;
                }
            }
        }

        return question;
    }

    generateVocabQuestion() {
        const vocab = [...this.unitData.vocabulary];
        const correct = Phaser.Math.Between(0, vocab.length - 1);
        const correctWord = vocab[correct];

        // Pick 3 wrong options
        const wrongs = vocab.filter((_, i) => i !== correct)
            .sort(() => Math.random() - 0.5)
            .slice(0, 3);

        // Randomly choose direction: en→cn or cn→en
        const showEn = Math.random() > 0.5;

        const choices = [correctWord, ...wrongs].sort(() => Math.random() - 0.5);
        const correctIndex = choices.indexOf(correctWord);

        return {
            type: 'vocabulary',
            question: showEn ? correctWord.en : correctWord.cn,
            questionSub: showEn ? `/${correctWord.phonetic}/` : '',
            hint: showEn ? '选择中文意思' : '选择对应的英文',
            choices: choices.map(c => showEn ? c.cn : c.en),
            correctIndex: correctIndex,
            correctAnswer: showEn ? correctWord.cn : correctWord.en,
            audioText: correctWord.en,
            explain: `${correctWord.en} = ${correctWord.cn}`,
            isReview: false
        };
    }

    generateListeningQuestion() {
        const vocab = [...this.unitData.vocabulary];
        const correct = Phaser.Math.Between(0, vocab.length - 1);
        const correctWord = vocab[correct];

        const wrongs = vocab.filter((_, i) => i !== correct)
            .sort(() => Math.random() - 0.5)
            .slice(0, 3);

        const choices = [correctWord, ...wrongs].sort(() => Math.random() - 0.5);
        const correctIndex = choices.indexOf(correctWord);

        return {
            type: 'listening',
            question: '听发音，选择对应的单词',
            questionSub: '点击喇叭重复播放',
            hint: '仔细听发音哦~',
            choices: choices.map(c => c.en),
            correctIndex: correctIndex,
            correctAnswer: correctWord.en,
            audioText: correctWord.en,
            explain: `${correctWord.en} ${correctWord.phonetic} = ${correctWord.cn}`,
            isReview: false
        };
    }

    generateSentenceQuestion() {
        const sentences = [...this.unitData.sentences];
        const sentence = sentences[Phaser.Math.Between(0, sentences.length - 1)];

        // Split into words, strip punctuation and lowercase for clean display
        const rawWords = sentence.en.split(' ');
        const words = rawWords.map(w => w.replace(/[.,!?;:'"]/g, '').toLowerCase());
        const shuffled = [...words].sort(() => Math.random() - 0.5);

        return {
            type: 'sentence',
            question: `连词成句：${sentence.cn}`,
            questionSub: '',
            hint: '把单词排成正确的句子（点击单词放置，点击已放单词可修改）',
            choices: shuffled,
            correctOrder: words,
            correctIndex: 0,
            correctAnswer: sentence.en,
            audioText: sentence.en,
            explain: `${sentence.en}\n${sentence.cn}`,
            isReview: false
        };
    }

    generateGrammarQuestion() {
        const grammar = this.unitData.grammar;
        if (!grammar || !grammar.quizOptions) {
            return this.generateVocabQuestion();
        }

        const entries = Object.entries(grammar.quizOptions);
        const entry = entries[Phaser.Math.Between(0, entries.length - 1)];
        const [question, options] = entry;

        // The correct answer should be among the options
        // For simplicity, assume first option is correct
        const correctIndex = 0;
        const shuffled = [...options].sort(() => Math.random() - 0.5);

        return {
            type: 'grammar',
            question: question,
            questionSub: '选择正确的答案填空',
            hint: `语法点：${grammar.title}`,
            choices: shuffled,
            correctIndex: shuffled.indexOf(options[0]),
            correctAnswer: options[0],
            audioText: question.replace('___', options[0]),
            explain: `正确：${question.replace('___', options[0])}`,
            isReview: false
        };
    }

    generatePhonicsQuestion() {
        const phonics = this.unitData.phonics;
        if (!phonics || !phonics.words || phonics.words.length === 0) {
            return this.generateVocabQuestion();
        }

        const correct = phonics.words[Phaser.Math.Between(0, phonics.words.length - 1)];
        if (!correct || !correct.en) return this.generateVocabQuestion();

        // Pick wrong words from vocabulary with different sound patterns
        const vocab = [...this.unitData.vocabulary]
            .filter(v => v.en !== correct.en)
            .sort(() => Math.random() - 0.5)
            .slice(0, 3);

        // Ensure minimum 2 choices
        const choices = [correct, ...vocab].sort(() => Math.random() - 0.5);
        const correctIndex = choices.indexOf(correct);

        if (correctIndex < 0 || choices.length < 2) {
            return this.generateVocabQuestion();
        }

        return {
            type: 'phonics',
            question: `哪个单词包含 ${(phonics.pattern || '').split(',')[0]}？`,
            questionSub: `语音规律：${phonics.pattern || ''}`,
            hint: '仔细看单词的发音',
            choices: choices.map(c => `${c.en} ${c.phonetic || ''}`),
            correctIndex: correctIndex,
            correctAnswer: `${correct.en} ${correct.phonetic || ''}`,
            audioText: correct.en,
            explain: `${correct.en} 包含 ${(phonics.pattern || '').split(',')[0]}`,
            isReview: false
        };
    }

    generateSpellingQuestion() {
        const vocab = [...this.unitData.vocabulary].filter(v => v.en.length >= 3);
        if (vocab.length === 0) return this.generateVocabQuestion();

        const correct = vocab[Phaser.Math.Between(0, vocab.length - 1)];
        const word = correct.en;
        const letters = word.split('');

        // Hide 30-50% of letters (at least 1, at most all but 2)
        const numToHide = Math.max(1, Math.min(Math.floor(word.length * 0.5), Math.floor(word.length * 0.3)));
        const numHide = Phaser.Math.Between(Math.max(1, Math.floor(word.length * 0.3)), Math.max(1, Math.floor(word.length * 0.5)));

        // Pick random positions to hide (prefer consonants, avoid first letter being hidden)
        const hideable = letters.map((l, i) => ({ letter: l, index: i }))
            .filter(item => item.index > 0); // keep first letter visible as hint
        const shuffled = hideable.sort(() => Math.random() - 0.5);
        const toHide = shuffled.slice(0, Math.min(numHide, hideable.length));
        const hideIndices = new Set(toHide.map(h => h.index));

        // Build letter blanks
        const blanks = letters.map((l, i) => ({
            letter: l,
            hidden: hideIndices.has(i),
            filled: hideIndices.has(i) ? '' : l
        }));

        // Collect hidden letters as the correct answer
        const hiddenLetters = toHide.map(h => h.letter);

        // Generate distractor letters from other vocab words
        const otherWords = [...this.unitData.vocabulary]
            .filter(v => v.en !== word)
            .sort(() => Math.random() - 0.5);
        const distractors = [];
        for (const ow of otherWords) {
            for (const ch of ow.en.toLowerCase()) {
                if (!hiddenLetters.includes(ch) && !distractors.includes(ch) && /[a-z]/.test(ch)) {
                    distractors.push(ch);
                    if (distractors.length >= hiddenLetters.length + 3) break;
                }
            }
            if (distractors.length >= hiddenLetters.length + 3) break;
        }

        // All letter choices = hidden letters + extra distractors (ensure all hidden letters are included)
        const allChoices = [...new Set([...hiddenLetters, ...distractors])];
        // Ensure at least 6 choices and ALL hidden letters are present
        let finalChoices = [...hiddenLetters];
        const extraChoices = allChoices.filter(c => !hiddenLetters.includes(c))
            .sort(() => Math.random() - 0.5);
        finalChoices.push(...extraChoices.slice(0, Math.max(0, 6 - hiddenLetters.length)));
        finalChoices = [...new Set(finalChoices)].sort(() => Math.random() - 0.5);

        // Build display text: "d _ c t _ r"
        const displayWord = blanks.map(b => b.hidden ? '_' : b.letter).join(' ');
        const correctBlanks = blanks.map(b => b.hidden ? b.letter : '').join('');

        return {
            type: 'spelling',
            question: `补全单词：${displayWord}`,
            questionSub: `${correct.cn}  /${correct.phonetic}/`,
            hint: '听发音，选择正确的字母补全单词',
            choices: finalChoices,
            correctIndex: -1, // special: multiple blanks, answer is the completed word
            correctAnswer: word,
            correctBlanks: hiddenLetters,
            blanks: blanks,
            displayWord: displayWord,
            audioText: word,
            explain: `${word} = ${correct.cn}`,
            isReview: false
        };
    }

    generateClozeQuestion() {
        const sentences = this.unitData.sentences;
        if (!sentences || sentences.length === 0) return this.generateVocabQuestion();
        const vocab = this.unitData.vocabulary;

        // Pick a sentence and find a content word that exists in unit vocab
        const sentence = sentences[Phaser.Math.Between(0, sentences.length - 1)];
        const words = sentence.en.split(/\s+/);
        const vocabWords = new Set(vocab.map(v => v.en.toLowerCase()));
        const contentWords = [];

        words.forEach((w, i) => {
            const clean = w.replace(/[.,!?;:'"]/g, '').toLowerCase();
            if (vocabWords.has(clean) && clean.length > 1) {
                contentWords.push({ word: w, clean: clean, index: i });
            }
        });

        if (contentWords.length === 0) {
            // Fallback: pick any non-trivial word not in stop-words
            const stopWords = ['a', 'an', 'the', 'is', 'are', 'am', 'was', 'were',
                'in', 'on', 'at', 'to', 'for', 'of', 'with', 'and', 'or', 'but',
                'it', 'this', 'that', 'he', 'she', 'they', 'we', 'you', 'I', 'my',
                'do', 'does', 'did', 'can', 'will', 'not', 'no', 'yes', 'has', 'have'];
            words.forEach((w, i) => {
                const clean = w.replace(/[.,!?;:'"]/g, '').toLowerCase();
                if (!stopWords.includes(clean) && clean.length > 1) {
                    contentWords.push({ word: w, clean: clean, index: i });
                }
            });
        }

        if (contentWords.length === 0) return this.generateVocabQuestion();

        const picked = contentWords[Phaser.Math.Between(0, contentWords.length - 1)];
        const blankWord = picked.clean;
        const cleanWord = picked.word.replace(/[.,!?;:'"]/g, '');

        // Find matching vocab entry
        const correctVocab = vocab.find(v => v.en.toLowerCase() === blankWord);

        // Build sentence with blank
        const sentenceWithBlank = words.map((w, i) =>
            i === picked.index ? '________' : w
        ).join(' ');

        // Generate wrong options from unit vocabulary
        const wrongs = vocab
            .filter(v => v.en.toLowerCase() !== blankWord)
            .sort(() => Math.random() - 0.5)
            .slice(0, 3);

        const choices = [correctVocab || { en: cleanWord, cn: '' }, ...wrongs]
            .sort(() => Math.random() - 0.5);
        const correctIndex = choices.findIndex(c => c.en.toLowerCase() === blankWord);

        return {
            type: 'cloze',
            question: sentenceWithBlank,
            questionSub: `句子意思：${sentence.cn}`,
            hint: '选择正确的单词填入空白处',
            choices: choices.map(c => c.en),
            correctIndex: correctIndex,
            correctAnswer: cleanWord,
            audioText: sentence.en,
            explain: `完整句子：${sentence.en}\n${sentence.cn}`,
            isReview: false
        };
    }

    fallbackQuestion() {
        return {
            type: 'vocabulary',
            question: 'What is this?',
            questionSub: '',
            hint: '',
            choices: ['A', 'B', 'C'],
            correctIndex: 0,
            correctAnswer: 'A',
            audioText: 'A',
            explain: '',
            isReview: false
        };
    }

    checkAnswer(question, userIndex) {
        const correct = userIndex === question.correctIndex;
        if (!correct) {
            this.recordWrongAnswer(question);
        }
        return correct;
    }

    recordWrongAnswer(question) {
        const key = question.question;
        const existing = this.wrongAnswers.find(w => w.question === key);
        if (existing) {
            existing.count++;
            existing.lastWrong = Date.now();
            existing.nextReview = Date.now() + 86400000; // 1 day
        } else {
            this.wrongAnswers.push({
                question: key,
                data: { ...question, isReview: true },
                count: 1,
                lastWrong: Date.now(),
                nextReview: Date.now() + 86400000
            });
        }
        this.saveWrongAnswers();
    }

    getReviewQuestions(count) {
        const now = Date.now();
        const due = this.wrongAnswers.filter(w => w.nextReview <= now);
        return due.slice(0, count);
    }

    getStats() {
        return {
            totalWrong: this.wrongAnswers.length,
            reviewDue: this.getReviewQuestions(99).length
        };
    }

    loadWrongAnswers() {
        try {
            const raw = JSON.parse(localStorage.getItem('wrongAnswers_v2') || '[]');
            // Filter out corrupted entries
            return raw.filter(w => w.data && w.data.type && w.data.question && Array.isArray(w.data.choices));
        } catch {
            return [];
        }
    }

    saveWrongAnswers() {
        try {
            localStorage.setItem('wrongAnswers_v2', JSON.stringify(this.wrongAnswers));
        } catch { /* storage full */ }
    }

    resetWrongAnswers() {
        this.wrongAnswers = [];
        this.saveWrongAnswers();
    }
}


// --- js/entities/Player.js ---
class Player extends Phaser.Physics.Arcade.Sprite {
    constructor(scene, x, y) {
        super(scene, x, y, 'player_idle');
        scene.add.existing(this);
        scene.physics.add.existing(this);

        this.setCollideWorldBounds(true);
        this.body.setSize(18, 30);
        this.body.setOffset(7, 4);

        // Movement
        this.speed = 200;
        this.jumpForce = -480;
        this.isJumping = false;
        this.coins = 0;
        this.lives = 3;

        // Input
        this.cursors = scene.input.keyboard.createCursorKeys();
        this.spaceKey = scene.input.keyboard.addKey('SPACE');
        this.wasd = {
            up: scene.input.keyboard.addKey('W'),
            left: scene.input.keyboard.addKey('A'),
            right: scene.input.keyboard.addKey('D')
        };

        // Touch input for mobile
        this.touchLeft = false;
        this.touchRight = false;
        this.touchJump = false;
        this.setupTouchInput(scene);

        // Animation state
        this.facingRight = true;
        this.walkTimer = 0;
        this.currentWalkFrame = 'player_walk1';
    }

    setupTouchInput(scene) {
        scene.input.on('pointerdown', (pointer) => {
            const halfW = scene.cameras.main.width / 2;
            if (pointer.x < halfW / 2) {
                this.touchLeft = true;
            } else if (pointer.x > halfW * 1.5) {
                this.touchRight = true;
            } else {
                this.touchJump = true;
            }
        });
        scene.input.on('pointerup', () => {
            this.touchLeft = false;
            this.touchRight = false;
            this.touchJump = false;
        });
    }

    update() {
        const onGround = this.body.blocked.down || this.body.touching.down;

        // Horizontal movement (keyboard + touch)
        const left = this.cursors.left.isDown || this.wasd.left.isDown || this.touchLeft;
        const right = this.cursors.right.isDown || this.wasd.right.isDown || this.touchRight;
        const jump = this.cursors.up.isDown || this.wasd.up.isDown || this.spaceKey.isDown || this.touchJump;

        if (left) {
            this.setVelocityX(-this.speed);
            this.setFlipX(true);
            this.facingRight = false;
        } else if (right) {
            this.setVelocityX(this.speed);
            this.setFlipX(false);
            this.facingRight = true;
        } else {
            this.setVelocityX(0);
        }

        // Jump (only when on ground)
        if (jump && onGround && !this._jumpLock) {
            this.setVelocityY(this.jumpForce);
            this._jumpLock = true;
            if (typeof audioManager !== 'undefined' && audioManager) {
                audioManager.sfxJump();
            }
        }

        // Release jump lock when key released and on ground
        if (!jump && onGround) {
            this._jumpLock = false;
        }

        if (onGround) {
            this.isJumping = false;
        }

        // Animation
        if (!onGround) {
            this.setTexture('player_jump');
        } else if (left || right) {
            this.walkTimer += this.scene.game.loop.delta;
            if (this.walkTimer > 150) {
                this.walkTimer = 0;
                this.currentWalkFrame = this.currentWalkFrame === 'player_walk1' ? 'player_walk2' : 'player_walk1';
            }
            this.setTexture(this.currentWalkFrame);
        } else {
            this.setTexture('player_idle');
        }

        // Fall death check
        if (this.y > this.scene.cameras.main.height + 50) {
            this.die();
        }
    }

    addCoin() {
        this.coins++;
        this.setTint(0xffff00);
        this.scene.time.delayedCall(100, () => {
            this.clearTint();
        });
    }

    takeDamage() {
        this.lives--;
        this.setTint(0xff0000);
        this.scene.time.delayedCall(300, () => {
            this.clearTint();
        });

        // Brief invulnerability
        this.body.checkCollision.none = true;
        this.scene.time.delayedCall(1000, () => {
            if (this.active && this.body) {
                this.body.checkCollision.none = false;
            }
        });

        if (this.lives <= 0) {
            this.die();
        }
    }

    die() {
        this.scene.cameras.main.shake(300, 0.01);
        this.setTint(0xff0000);
        this.scene.time.delayedCall(500, () => {
            // Reset player instead of restarting scene (avoids keyboard state loss)
            if (this.scene.resetPlayer) {
                this.scene.resetPlayer();
            } else {
                this.scene.scene.restart();
            }
        });
    }
}

// Enemy entity - supports ground patrol, flying, and projectile types
class Enemy extends Phaser.Physics.Arcade.Sprite {
    constructor(scene, x, y, type) {
        super(scene, x, y, 'enemy');
        scene.add.existing(this);
        scene.physics.add.existing(this);

        this.enemyType = type || 'ground';
        this.patrolRange = 80;
        this.startX = x;
        this.startY = y;
        this._shootTimer = 0;

        // Visual variety per type
        this.body.setBounce(0);

        switch (this.enemyType) {
            case 'flying':
                this.setTint(0xff6b6b); // Red-ish
                this.body.setAllowGravity(false);
                this.body.setVelocityY(50);
                this.patrolRange = 60;
                break;
            case 'shooter':
                this.setTint(0xff9800); // Orange
                this.body.setVelocityX(30);
                this.patrolRange = 60;
                this._shootTimer = Phaser.Math.Between(2000, 4000);
                break;
            case 'speedy':
                this.setTint(0x00bcd4); // Cyan
                this.setScale(0.7);
                this.body.setVelocityX(80);
                this.patrolRange = 120;
                break;
            default: // ground
                this.setTint(0x9932cc); // Purple (original)
                this.body.setVelocityX(40);
                break;
        }
    }

    update(time, delta) {
        if (!this.active) return;

        switch (this.enemyType) {
            case 'flying':
                // Float up and down
                if (this.y < this.startY - this.patrolRange) {
                    this.body.setVelocityY(50);
                } else if (this.y > this.startY + this.patrolRange) {
                    this.body.setVelocityY(-50);
                }
                break;
            case 'shooter':
                // Patrol and shoot
                if (this.x > this.startX + this.patrolRange) {
                    this.body.setVelocityX(-30);
                } else if (this.x < this.startX - this.patrolRange) {
                    this.body.setVelocityX(30);
                }
                // Shoot projectile
                this._shootTimer -= delta;
                if (this._shootTimer <= 0) {
                    this.shoot();
                    this._shootTimer = Phaser.Math.Between(3000, 5000);
                }
                break;
            case 'speedy':
                // Fast patrol
                if (this.x > this.startX + this.patrolRange) {
                    this.body.setVelocityX(-80);
                    this.setFlipX(true);
                } else if (this.x < this.startX - this.patrolRange) {
                    this.body.setVelocityX(80);
                    this.setFlipX(false);
                }
                break;
            default: // ground
                if (this.x > this.startX + this.patrolRange) {
                    this.body.setVelocityX(-40);
                } else if (this.x < this.startX - this.patrolRange) {
                    this.body.setVelocityX(40);
                }
                break;
        }
    }

    shoot() {
        if (!this.scene || !this.active) return;
        // Create a small projectile toward the player
        const proj = this.scene.add.circle(this.x, this.y, 6, 0xff0000);
        proj.setDepth(5);
        this.scene.physics.add.existing(proj);
        proj.body.setAllowGravity(false);

        // Direction toward player (or left if player not found)
        const player = this.scene.player;
        const dirX = player ? (player.x < this.x ? -1 : 1) : -1;
        proj.body.setVelocity(dirX * 150, -60);

        // Add to scene's enemy projectiles list for collision
        if (!this.scene._enemyProjectiles) {
            this.scene._enemyProjectiles = this.scene.physics.add.group();
        }
        this.scene._enemyProjectiles.add(proj);

        // Auto-destroy after 3 seconds
        this.scene.time.delayedCall(3000, () => {
            if (proj.active) proj.destroy();
        });
    }
}


// --- js/entities/Boss.js ---
class Boss extends Phaser.GameObjects.Container {
    constructor(scene, x, y) {
        super(scene, x, y);
        scene.add.existing(this);

        // Use a hidden physics sprite as the body (avoids isParent error with Container physics)
        this._bodySprite = scene.add.zone(x, y, 60, 60);
        scene.physics.add.existing(this._bodySprite, false);
        this._bodySprite.body.setImmovable(true);
        this._bodySprite.body.setAllowGravity(false);

        this.hp = 3;
        this.maxHp = 3;
        this.defeated = false;

        // Boss body (large, menacing)
        const body = scene.add.graphics();
        body.fillStyle(0x4a148c);
        body.fillCircle(0, 0, 30);
        body.fillStyle(0x7b2d8e);
        body.fillCircle(-8, -12, 10);
        body.fillCircle(8, -12, 10);
        // Red eyes
        body.fillStyle(0xff0000);
        body.fillCircle(-10, -8, 6);
        body.fillCircle(10, -8, 6);
        body.fillStyle(0xffff00);
        body.fillCircle(-10, -8, 3);
        body.fillCircle(10, -8, 3);
        // Mouth
        body.fillStyle(0xffffff);
        body.fillRect(-12, 8, 24, 8);
        body.fillStyle(0x333333);
        for (let i = 0; i < 4; i++) {
            body.fillRect(-10 + i * 6, 10, 3, 3);
        }
        // Crown
        body.fillStyle(0xffd700);
        body.fillTriangle(-15, -28, 0, -44, 15, -28);
        body.fillTriangle(-18, -28, -5, -38, 8, -28);
        body.fillTriangle(-8, -28, 5, -38, 18, -28);
        this.add(body);

        // HP bar background
        const hpBg = scene.add.graphics();
        hpBg.fillStyle(0x333333);
        hpBg.fillRect(-35, -55, 70, 8);
        this.add(hpBg);

        // HP bar foreground
        this.hpBar = scene.add.graphics();
        this.updateHpBar();
        this.add(this.hpBar);

        // Boss label
        const label = scene.add.text(0, -65, 'BOSS', {
            fontSize: '12px',
            fontFamily: 'Arial',
            fontStyle: 'bold',
            color: '#ff6b6b',
            stroke: '#000',
            strokeThickness: 2
        }).setOrigin(0.5);
        this.add(label);

        // Bobbing animation (moves the container AND the body sprite together)
        this.initY = y;
        scene.tweens.add({
            targets: this,
            y: y - 10,
            duration: 800,
            yoyo: true,
            repeat: -1,
            ease: 'Sine.easeInOut',
            onUpdate: () => {
                this._bodySprite.y = this.y;
                this._bodySprite.x = this.x;
            }
        });
    }

    updateHpBar() {
        this.hpBar.clear();
        const ratio = this.hp / this.maxHp;
        const color = ratio > 0.6 ? 0x4caf50 : ratio > 0.3 ? 0xff9800 : 0xff0000;
        this.hpBar.fillStyle(color);
        this.hpBar.fillRect(-35, -55, 70 * ratio, 8);
    }

    takeDamage() {
        if (this.defeated) return false;
        this.hp--;
        this.updateHpBar();

        this.scene.tweens.add({
            targets: this,
            alpha: 0.3,
            duration: 100,
            yoyo: true,
            repeat: 2
        });

        if (this.hp <= 0) {
            this.defeat();
            return true;
        }
        return false;
    }

    defeat() {
        this.defeated = true;
        this._bodySprite.body.enable = false;
        this.scene.cameras.main.shake(400, 0.02);
        for (let i = 0; i < 15; i++) {
            const sparkle = this.scene.add.image(
                this.x + Phaser.Math.Between(-30, 30),
                this.y + Phaser.Math.Between(-30, 30),
                'sparkle'
            ).setScale(1.5);
            this.scene.tweens.add({
                targets: sparkle,
                x: sparkle.x + Phaser.Math.Between(-80, 80),
                y: sparkle.y - Phaser.Math.Between(30, 80),
                alpha: 0,
                scale: 0,
                duration: 600,
                onComplete: () => sparkle.destroy()
            });
        }

        const vText = this.scene.add.text(this.x, this.y - 50, '击败Boss!', {
            fontSize: '18px',
            fontFamily: 'Arial',
            fontStyle: 'bold',
            color: '#ffd700',
            stroke: '#333',
            strokeThickness: 3
        }).setOrigin(0.5);
        this.scene.tweens.add({
            targets: vText,
            y: this.y - 70,
            alpha: 0,
            duration: 1200,
            onComplete: () => vText.destroy()
        });

        this.scene.time.delayedCall(800, () => {
            this.destroy();
        });
    }
}

class BootScene extends Phaser.Scene {
    constructor() {
        super({ key: 'BootScene' });
    }

        // Simple loading text
        const loadText = this.add.text(width / 2, height / 2, '正在准备游戏...', {

        // Question block - hit (dark, empty)

        qh.fillStyle(0x8b7355);
        qh.fillRect(0, 0, 32, 32);
        qh.lineStyle(1, 0x5c4a2e);
        qh.strokeRect(0, 0, 32, 32);
        qh.fillStyle(0x7a6240);
        qh.fillRect(3, 3, 26, 26);
        qh.generateTexture('question_block_hit', 32, 32);
        qh.destroy();

        // --- Coin ---
        const cg = this.make.graphics({ add: false });
        cg.fillStyle(0xffd700);
        cg.fillCircle(8, 8, 7);
        cg.fillStyle(0xffec8b);
        cg.fillCircle(7, 7, 3);
        cg.generateTexture('coin', 16, 16);
        cg.destroy();

        // --- Enemy ---
        const eg = this.make.graphics({ add: false });
        eg.fillStyle(0x9932cc);
        eg.fillCircle(16, 18, 14);
        eg.fillStyle(0xffffff);
        eg.fillCircle(11, 14, 4);
        eg.fillCircle(21, 14, 4);
        eg.fillStyle(0x333333);
        eg.fillCircle(12, 14, 2);
        eg.fillCircle(22, 14, 2);
        eg.lineStyle(2, 0x333333);
        eg.lineBetween(7, 9, 14, 11);
        eg.lineBetween(25, 9, 18, 11);

        const cx = 12, cy = 12, r = 10, ri = 4;

        spg.destroy();

        pg.fillStyle(0x333333);

class WorldSelectScene extends Phaser.Scene {
    constructor() {
        super({ key: 'WorldSelectScene' });
    }

    create() {
        const { width, height } = this.cameras.main;

        if (!progressManager) {
            progressManager = new ProgressManager();
        }

        // Background
        const bg = this.add.graphics();
        bg.fillGradientStyle(0x1a1a2e, 0x1a1a2e, 0x2d1b4e, 0x4a2c6e, 1);
        bg.fillRect(0, 0, width, height);

        // Title
        this.add.text(width / 2, 30, '选择世界', {
            fontSize: '32px',
            fontFamily: 'Arial',
            fontStyle: 'bold',
            color: '#ffd700',
            stroke: '#333',
            strokeThickness: 3
        }).setOrigin(0.5);

        this.add.text(width / 2, 62, `存档进度：世界 ${progressManager.progress.currentWorld}`, {
            fontSize: '14px',
            fontFamily: 'Arial',
            color: '#dda0dd'
        }).setOrigin(0.5);

        // World nodes - 2 rows × 3 columns
        const worldNames = [
            { id: 1, title: '职业', en: 'People at Work', icon: '👩‍⚕️' },
            { id: 2, title: '情绪', en: 'How do you feel?', icon: '😊' },
            { id: 3, title: '才能', en: 'Talent Show', icon: '⭐' },
            { id: 4, title: '植物', en: 'Plant Life', icon: '🌻' },
            { id: 5, title: '校园', en: 'School Events', icon: '🏫' },
            { id: 6, title: '服装', en: 'Cool Clothes', icon: '👗' },
        ];

        const startX = width / 2 - 200;
        const startY = 110;
        const colGap = 200;
        const rowGap = 150;

        worldNames.forEach((world, i) => {
            const col = i % 3;
            const row = Math.floor(i / 3);
            const wx = startX + col * colGap;
            const wy = startY + row * rowGap;

            const worldData = progressManager.progress.worlds[world.id];
            const isUnlocked = worldData && worldData.unlocked;

            // World card
            const card = this.add.graphics();
            const cardW = 170;
            const cardH = 120;

            if (isUnlocked) {
                card.fillStyle(0xffffff, 0.15);
                card.fillRoundedRect(wx - cardW / 2, wy - cardH / 2, cardW, cardH, 12);
                card.lineStyle(2, UNITS[world.id] ? UNITS[world.id].bgColor : 0xffd700);
                card.strokeRoundedRect(wx - cardW / 2, wy - cardH / 2, cardW, cardH, 12);
            } else {
                card.fillStyle(0x333333, 0.5);
                card.fillRoundedRect(wx - cardW / 2, wy - cardH / 2, cardW, cardH, 12);
                card.lineStyle(2, 0x555555);
                card.strokeRoundedRect(wx - cardW / 2, wy - cardH / 2, cardW, cardH, 12);
            }

            // World icon
            const icon = this.add.text(wx, wy - 20, world.icon, {
                fontSize: '36px'
            }).setOrigin(0.5).setAlpha(isUnlocked ? 1 : 0.3);

            // World name
            const nameText = this.add.text(wx, wy + 20, `世界${world.id}`, {
                fontSize: '16px',
                fontFamily: 'Arial',
                fontStyle: 'bold',
                color: isUnlocked ? '#ffffff' : '#666666'
            }).setOrigin(0.5);

            const cnText = this.add.text(wx, wy + 38, world.title, {
                fontSize: '13px',
                fontFamily: 'Arial',
                color: isUnlocked ? '#dda0dd' : '#555555'
            }).setOrigin(0.5);

            // Lock icon for locked worlds
            if (!isUnlocked) {
                const lock = this.add.text(wx, wy - 45, '🔒', {
                    fontSize: '18px'
                }).setOrigin(0.5);
            }

            // Interactive zone
            if (isUnlocked) {
                const zone = this.add.zone(wx, wy, cardW, cardH)
                    .setInteractive({ useHandCursor: true });

                zone.on('pointerover', () => {
                    card.clear();
                    card.fillStyle(0xffffff, 0.25);
                    card.fillRoundedRect(wx - cardW / 2, wy - cardH / 2, cardW, cardH, 12);
                    card.lineStyle(3, UNITS[world.id] ? UNITS[world.id].bgColor : 0xffd700);
                    card.strokeRoundedRect(wx - cardW / 2, wy - cardH / 2, cardW, cardH, 12);
                });

                zone.on('pointerout', () => {
                    card.clear();
                    card.fillStyle(0xffffff, 0.15);
                    card.fillRoundedRect(wx - cardW / 2, wy - cardH / 2, cardW, cardH, 12);
                    card.lineStyle(2, UNITS[world.id] ? UNITS[world.id].bgColor : 0xffd700);
                    card.strokeRoundedRect(wx - cardW / 2, wy - cardH / 2, cardW, cardH, 12);
                });

                zone.on('pointerdown', () => {
                    // Determine level type for first level
                    this.cameras.main.fadeOut(400, 0, 0, 0);
                    this.time.delayedCall(400, () => {
                        this.scene.start('GameScene', {
                            world: world.id,
                            level: 1,
                            type: 'vocabulary'
                        });
                    });
                });
            }
        });

        // Reset progress button (bottom)
        const resetY = height - 30;
        this.add.text(width / 2, resetY, '重置进度', {
            fontSize: '12px',
            fontFamily: 'Arial',
            color: '#888888'
        }).setOrigin(0.5).setInteractive({ useHandCursor: true })
            .on('pointerover', function () { this.setColor('#ff6b6b'); })
            .on('pointerout', function () { this.setColor('#888888'); })
            .on('pointerdown', () => {
                progressManager.resetProgress();
                this.scene.restart();
            }, this);

        // Fade in
        this.cameras.main.fadeIn(400);
    }
}


// --- js/scenes/GameScene.js ---
class GameScene extends Phaser.Scene {
    constructor() {
        super({ key: 'GameScene' });
    }

    init(data) {
        this.worldNum = data.world || 1;
        this.levelNum = data.level || 1;
        this.levelType = data.type || 'vocabulary';
        this.totalCoins = 0;
        this.collectedCoins = 0;
        this.questionsAnswered = 0;
        this.correctAnswers = 0;
        this._flagTriggered = false;
        this._levelComplete = false;
        this.flagReached = false;
    }

    create() {
        try {
            this._doCreate();
        } catch (e) {
            console.error('GameScene create error:', e);
            // Show error text on screen
            this.add.text(400, 240, '加载失败: ' + e.message, {
                fontSize: '16px', fontFamily: 'Arial', color: '#ff0000',
                wordWrap: { width: 700 }, align: 'center'
            }).setOrigin(0.5);
        }
    }

    _doCreate() {
        const { width, height } = this.cameras.main;

        // Dynamic world background color
        const worldColors = [
            0x87ceeb, 0xffdab9, 0xdda0dd, 0x90ee90, 0xfffacd, 0xffb6c1
        ];
        this.cameras.main.setBackgroundColor(worldColors[this.worldNum - 1] || 0x87ceeb);

        // Init audio (safe)
        try { if (!audioManager) audioManager = new AudioManager(); } catch (e) {}

        // Init quiz system
        const unitData = UNITS[this.worldNum] || UNITS[1];
        this.quizManager = new QuizManager(unitData);
        this.questionUI = new QuestionUI(this);

        // Build level
        this.buildLevel();

        // Spawn player
        this.player = new Player(this, 80, 300);
        this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
        this.cameras.main.setBounds(0, 0, this.levelWidth, height);
        this.physics.world.setBounds(0, 0, this.levelWidth, height);

        // Setup collisions
        this.physics.add.collider(this.player, this.platforms);
        this.physics.add.collider(this.player, this.groundGroup);

        if (this.questionBlocks) {
            this.physics.add.collider(this.player, this.questionBlocks, this.hitQuestionBlock, null, this);
        }

        if (this.coins) {
            this.physics.add.overlap(this.player, this.coins, this.collectCoin, null, this);
        }

        if (this.enemies) {
            this.physics.add.collider(this.player, this.enemies, this.touchEnemy, null, this);
            this.physics.add.collider(this.enemies, this.groundGroup);
            this.physics.add.collider(this.enemies, this.platforms);
        }

        // Enemy projectile group
        this._enemyProjectiles = this.physics.add.group();
        this.physics.add.overlap(this.player, this._enemyProjectiles, this.hitByProjectile, null, this);

        // Player growth tracking
        this._consecutiveCorrect = 0;
        this._playerGrown = false;

        // Flag trigger physics overlap (in addition to x-position check)
        if (this.flagTrigger) {
            this.physics.add.overlap(this.player, this.flagTrigger, () => {
                if (!this._flagTriggered) {
                    this._flagTriggered = true;
                    console.log('Flag overlap detected!');
                    this.flagReached = true;
                    this.reachFlag();
                }
            }, null, this);
        }

        // HUD
        this.createHUD();

        // Manual flag trigger key (press 'F' in game to test level completion)
        this.fKey = this.input.keyboard.addKey('F');
        this.fKey.on('down', () => {
            if (!this.flagReached) {
                console.log('Manual flag trigger via F key!');
                this.flagReached = true;
                this.reachFlag();
            }
        });

        // Fade in
        this.cameras.main.fadeIn(500, 255, 255, 255);
    }

    buildLevel() {
        const { height } = this.cameras.main;

        this.levelWidth = 3200;

        // Ground
        this.groundGroup = this.physics.add.staticGroup();
        const groundTiles = Math.ceil(this.levelWidth / TILE_SIZE);
        for (let i = 0; i < groundTiles; i++) {
            const tile = this.groundGroup.create(i * TILE_SIZE + 16, height - 16, 'ground');
            tile.setDisplaySize(TILE_SIZE, TILE_SIZE);
            tile.refreshBody();
        }

        // Physics groups
        this.platforms = this.physics.add.staticGroup();
        this.questionBlocks = this.physics.add.staticGroup();
        this.coins = this.physics.add.group();
        this.enemies = this.physics.add.group();

        // Different layouts per level type
        const layout = this.getLayoutConfig(height);
        this.buildPlatforms(layout);
        this.buildQuestionBlocks(layout);
        this.buildCoins(layout);
        this.buildEnemies(layout);

        // Flag at end - texture-based, non-overlapping with trigger
        this._flagX = this.levelWidth - 120;
        this._flagY = height - 85;

        this.flag = this.add.image(this._flagX, this._flagY, 'flag').setDepth(10);
        this.flagReached = false;
        this.tweens.add({
            targets: this.flag,
            y: this._flagY - 10,
            duration: 600,
            yoyo: true,
            repeat: -1,
            ease: 'Sine.easeInOut'
        });

        // Invisible flag trigger zone (uses sparkle texture, NOT flag texture)
        this.flagTrigger = this.physics.add.staticGroup();
        const trig = this.flagTrigger.create(this._flagX, this._flagY + 20, 'sparkle');
        trig.setAlpha(0).setScale(5);
        trig.body.setSize(60, 120);
        trig.setDepth(1);

        // Boss level: spawn boss near the flag
        if (this.levelType === 'boss') {
            this._boss = new Boss(this, this.levelWidth - 500, height - 130);
            this.physics.add.collider(this.player, this._boss._bodySprite);

            // Boss question blocks (3 floating around boss)
            this._bossBlocks = [];
            for (let i = 0; i < 3; i++) {
                const bx = this._boss.x - 60 + i * 60;
                const by = this._boss.y - 60;
                const block = this.questionBlocks.create(bx, by, 'question_block');
                block.setDisplaySize(TILE_SIZE, TILE_SIZE);
                block.refreshBody();
                block.isActive = true;
                block.isBossBlock = true;
                this._bossBlocks.push(block);
            }
        }

        this.addDecorations(height);
    }

    getLayoutConfig(height) {
        const baseX = 300;
        const gap = 180;
        const type = this.levelType;

        const configs = {
            // Level 1: Vocabulary - gentle intro, many question blocks
            vocabulary: {
                platforms: [
                    [350, 390, 3], [550, 340, 3], [740, 320, 3],
                    [940, 360, 4], [1160, 390, 3], [1380, 350, 4],
