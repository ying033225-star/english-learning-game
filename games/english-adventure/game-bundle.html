                enemies: [{ x: 500, type: 'ground' }, { x: 1100, type: 'ground' }, { x: 1700, type: 'speedy' }, { x: 2300, type: 'ground' }],
            },
            // Level 2: Sentence - gentle intro, flying enemies
            sentence: {
                platforms: [
                    [300, 390, 3], [520, 350, 2], [700, 380, 3],
                    [920, 330, 2], [1100, 370, 4], [1340, 310, 3],
                    [1560, 360, 4], [1800, 320, 3], [2020, 380, 3], [2260, 350, 3],
                    [2500, 390, 3],
                ],
                questionBlocks: [
                    [330, 330], [550, 290], [730, 320],
                    [950, 270], [1130, 310], [1370, 250],
                    [1590, 300], [1830, 260], [2050, 320], [2290, 290],
                ],
                coins: { count: 8, startX: 400, spacing: 280, ys: [420, 380, 340, 300, 360] },
                enemies: [{ x: 700, type: 'flying' }, { x: 1500, type: 'ground' }],
            },
            // Level 3: Grammar - more challenging with shooters
            grammar: {
                platforms: [
                    [300, 390, 3], [500, 340, 2], [680, 380, 3],
                    [880, 310, 2], [1040, 360, 3], [1240, 300, 2],
                    [1420, 350, 4], [1660, 290, 2], [1840, 370, 3],
                    [2060, 320, 3], [2300, 380, 3],
                ],
                questionBlocks: [
                    [330, 330], [530, 280], [710, 320],
                    [910, 250], [1070, 300], [1270, 240],
                    [1450, 290], [1690, 230], [1870, 310], [2090, 260],
                ],
                coins: { count: 6, startX: 420, spacing: 350, ys: [400, 350, 310, 290] },
                enemies: [{ x: 550, type: 'speedy' }, { x: 1050, type: 'shooter' }, { x: 1550, type: 'flying' }, { x: 2100, type: 'ground' }],
            },
            // Level 4: Boss - intense, all enemy types
            boss: {
                platforms: [
                    [300, 380, 3], [500, 350, 3], [720, 320, 2],
                    [900, 370, 4], [1140, 340, 2], [1320, 310, 3],
                    [1540, 360, 4], [1780, 330, 3], [2020, 290, 2],
                    [2220, 350, 3], [2480, 380, 3],
                ],
                questionBlocks: [
                    [330, 320], [530, 290], [750, 260],
                    [930, 310], [1170, 280], [1350, 250],
                    [1570, 300], [1810, 270], [2050, 230], [2250, 290],
                ],
                coins: { count: 4, startX: 500, spacing: 600, ys: [370, 330, 300] },
                enemies: [
                    { x: 400, type: 'speedy' }, { x: 800, type: 'shooter' }, { x: 1200, type: 'flying' },
                    { x: 1600, type: 'shooter' }, { x: 2000, type: 'speedy' }, { x: 2400, type: 'ground' },
                ],
            },
        };

        return configs[type] || configs.vocabulary;
    }

    buildPlatforms(layout) {
        layout.platforms.forEach(([x, y, count]) => this.createPlatform(x, y, count));
    }

    buildQuestionBlocks(layout) {
        layout.questionBlocks.forEach(([x, y]) => this.createQuestionBlock(x, y));
    }

    buildCoins(layout) {
        const cfg = layout.coins;
        for (let i = 0; i < cfg.count; i++) {
            const cx = cfg.startX + i * cfg.spacing;
            const cy = cfg.ys[i % cfg.ys.length];
            const coin = this.coins.create(cx, cy, 'coin');
            coin.body.setAllowGravity(false);
            this.tweens.add({
                targets: coin,
                y: cy - 6,
                duration: 700,
                yoyo: true,
                repeat: -1,
                ease: 'Sine.easeInOut'
            });
            this.totalCoins++;
        }
    }

    buildEnemies(layout) {
        const h = this.cameras.main.height;
        layout.enemies.forEach(({ x, type }) => {
            const eType = type || 'ground';
            const y = eType === 'flying' ? h - 140 : h - 60;
            this.createEnemy(x, y, eType);
        });
    }

    createPlatform(x, y, tileCount) {
        for (let i = 0; i < tileCount; i++) {
            const tile = this.platforms.create(x + i * TILE_SIZE + 16, y, 'platform');
            tile.setDisplaySize(TILE_SIZE, 16);
            tile.refreshBody();
        }
    }

    createQuestionBlock(x, y) {
        const block = this.questionBlocks.create(x, y, 'question_block');
        block.setDisplaySize(TILE_SIZE, TILE_SIZE);
        block.refreshBody();
        block.isActive = true;
        return block;
    }

    createEnemy(x, y, type) {
        const enemyType = type || 'ground';
        // Create via group to ensure physics body is properly configured
        const enemy = this.enemies.create(x, y, 'enemy');
        enemy.body.setAllowGravity(enemyType !== 'flying');
        enemy.body.setBounce(0);
        enemy.enemyType = enemyType;
        enemy.startX = x;
        enemy.startY = y;
        enemy._shootTimer = 0;

        // Set visual and movement based on type
        switch (enemyType) {
            case 'flying':
                enemy.setTint(0xff6b6b);
                enemy.body.setAllowGravity(false);
                enemy.body.setVelocityY(50);
                enemy.patrolRange = 60;
                enemy._initVelY = 50;
                break;
            case 'shooter':
                enemy.setTint(0xff9800);
                enemy.body.setVelocityX(30);
                enemy.patrolRange = 60;
                enemy._shootTimer = Phaser.Math.Between(2000, 4000);
                break;
            case 'speedy':
                enemy.setTint(0x00bcd4);
                enemy.setScale(0.7);
                enemy.body.setVelocityX(80);
                enemy.patrolRange = 120;
                break;
            default:
                enemy.setTint(0x9932cc);
                enemy.body.setVelocityX(40);
                enemy.patrolRange = 80;
                break;
        }
        return enemy;
    }

    spawnPenaltyEnemy(x, y) {
        const enemy = this.createEnemy(x, y - 60);
        // Drop from above
        enemy.y = y - 100;
        enemy.body.setVelocityY(100);
    }

    addDecorations(height) {
        const type = this.levelType;

        // Different bush colors per level type
        const bushColors = {
            vocabulary: 0x228b22, sentence: 0x7ec850, grammar: 0x2e7d32, boss: 0x4a148c
        };
        const bushColor = bushColors[type] || 0x228b22;

        for (let i = 0; i < 20; i++) {
            const bx = 100 + i * 160;
            const bush = this.add.graphics();
            bush.fillStyle(bushColor, 0.6);
            bush.fillCircle(bx, height - 58, 8);
            bush.fillCircle(bx + 8, height - 56, 10);
            bush.fillCircle(bx - 6, height - 56, 7);
        }

        // Different background elements per level type
        if (type === 'sentence') {
            // Floating word bubbles in background
            for (let i = 0; i < 6; i++) {
                const fx = 150 + i * 500;
                const fy = 60 + (i % 3) * 50;
                const bubble = this.add.graphics();
                bubble.fillStyle(0xdda0dd, 0.25);
                bubble.fillRoundedRect(fx - 30, fy - 12, 60, 24, 12);
                bubble.setScrollFactor(0.2);
            }
        } else if (type === 'grammar') {
            // Question marks in background
            for (let i = 0; i < 5; i++) {
                const qx = 200 + i * 600;
                const qy = 50 + (i % 2) * 60;
                const qmark = this.add.text(qx, qy, '?', {
                    fontSize: '40px', fontFamily: 'Arial', fontStyle: 'bold',
                    color: '#ff69b4'
                }).setAlpha(0.15).setScrollFactor(0.2);
            }
        } else if (type === 'boss') {
            // Warning stripes at bottom
            for (let i = 0; i < 8; i++) {
                const sx = i * 400;
                const stripe = this.add.graphics();
                stripe.fillStyle(0xff0000, 0.15);
                stripe.fillRect(sx, height - 70, 200, 8);
                stripe.setScrollFactor(0.3);
            }
        }

        // Background clouds (vary count and position by type)
        const cloudCount = type === 'boss' ? 10 : type === 'grammar' ? 6 : 8;
        for (let i = 0; i < cloudCount; i++) {
            const cx = i * (3200 / cloudCount) + 100;
            const cy = 30 + (i % 3) * 40;
            const cloud = this.add.graphics();
            const alpha = type === 'boss' ? 0.3 : 0.5;
            cloud.fillStyle(0xffffff, alpha);
            cloud.fillCircle(cx, cy, 15);
            cloud.fillCircle(cx + 15, cy - 3, 20);
            cloud.fillCircle(cx + 30, cy, 15);
            cloud.setScrollFactor(type === 'boss' ? 0.5 : 0.3);
        }
    }

    createHUD() {
        const hudY = 16;

        // Coin counter
        this.coinIcon = this.add.image(30, hudY + 8, 'coin').setScrollFactor(0).setDepth(100);
        this.coinText = this.add.text(46, hudY, '0', {
            fontSize: '18px',
            fontFamily: 'Arial',
            color: '#ffffff',
            stroke: '#333333',
            strokeThickness: 2
        }).setScrollFactor(0).setDepth(100);

        // Hearts
        this.hearts = [];
        for (let i = 0; i < 3; i++) {
            const heart = this.add.image(160 + i * 28, hudY + 8, 'heart').setScrollFactor(0).setDepth(100);
            this.hearts.push(heart);
        }

        // Level info with type name
        const typeNames = { vocabulary: '单词收集', sentence: '连词成句', grammar: '语法选择', boss: 'Boss挑战' };
        this.add.text(700, hudY, `世界${this.worldNum} - 第${this.levelNum}关`, {
            fontSize: '14px',
            fontFamily: 'Arial',
            color: '#ffffff',
            stroke: '#333333',
            strokeThickness: 2
        }).setScrollFactor(0).setDepth(100);
        this.add.text(700, hudY + 18, typeNames[this.levelType] || '', {
            fontSize: '11px',
            fontFamily: 'Arial',
            color: '#ffd700',
            stroke: '#333333',
            strokeThickness: 1
        }).setScrollFactor(0).setDepth(100);
        // HIGHLY VISIBLE version marker
        const vbg = this.add.graphics().setScrollFactor(0).setDepth(200);
        vbg.fillStyle(0xff0000, 1);
        vbg.fillRect(0, 0, 40, 20);
        this.add.text(20, 10, 'v15', {
            fontSize: '14px', fontFamily: 'Arial', fontStyle: 'bold', color: '#ffffff'
        }).setOrigin(0.5).setScrollFactor(0).setDepth(201);

        // DEBUG: show player position
        this.debugText = this.add.text(300, 60, '', {
            fontSize: '16px', fontFamily: 'Arial', fontStyle: 'bold',
            color: '#ffff00', stroke: '#000000', strokeThickness: 3
        }).setScrollFactor(0).setDepth(200);
    }

    hitQuestionBlock(player, block) {
        if (!block.isActive) return;

        // Only trigger when player hits from below
        if (!player.body.touching.up) return;

        block.isActive = false;
        block.setTexture('question_block_hit');

        // Bounce animation
        this.tweens.add({
            targets: block,
            y: block.y - 8,
            duration: 80,
            yoyo: true,
            ease: 'Quad.easeOut'
        });

        // Generate question based on level type
        const typeMap = {
            vocabulary: 'vocabulary',
            listening: 'listening',
            sentence: 'sentence',
            grammar: 'grammar',
            boss: 'vocabulary'
        };
        const qType = typeMap[this.levelType] || 'vocabulary';

        let actualType = qType;
        const questionCount = this.questionsAnswered || 0;
        if (this.levelType === 'vocabulary') {
            const vocabMod = questionCount % 5;
            if (vocabMod === 0) actualType = 'vocabulary';
            else if (vocabMod === 1) actualType = 'listening';
            else if (vocabMod === 2) actualType = 'spelling';
            else if (vocabMod === 3) actualType = 'cloze';
            else actualType = 'phonics';
        } else if (this.levelType === 'grammar') {
            const gramMod = questionCount % 3;
            if (gramMod === 0) actualType = 'grammar';
            else if (gramMod === 1) actualType = 'cloze';
            else actualType = 'vocabulary';
        } else if (this.levelType === 'sentence') {
            const sentMod = questionCount % 3;
            if (sentMod === 0) actualType = 'sentence';
            else if (sentMod === 1) actualType = 'cloze';
            else actualType = 'vocabulary';
        }

        const isBossBlock = block.isBossBlock === true;
        const question = this.quizManager.generateQuestion(actualType);

        this.questionUI.show(question, (correct) => {
            this.questionsAnswered++;

            if (correct) {
                this.correctAnswers++;
                this.collectedCoins++;
                this._consecutiveCorrect++;
                // Grow player after 3 consecutive correct answers
                if (this._consecutiveCorrect >= 3 && !this._playerGrown) {
                    this.growPlayer();
                }
                this.coinText.setText(this.collectedCoins.toString());
                if (audioManager) audioManager.sfxCorrect();

                // Coin effect
                const coin = this.add.image(block.x, block.y - 20, 'coin');
                this.tweens.add({
                    targets: coin,
                    y: block.y - 70,
                    alpha: 0,
                    duration: 500,
                    ease: 'Quad.easeOut',
                    onComplete: () => coin.destroy()
                });

                const posText = this.add.text(block.x, block.y - 40, '+1 ⭐', {
                    fontSize: '16px',
                    fontFamily: 'Arial',
                    color: '#ffd700',
                    stroke: '#333',
                    strokeThickness: 2
                }).setOrigin(0.5);
                this.tweens.add({
                    targets: posText,
                    y: block.y - 70,
                    alpha: 0,
                    duration: 800,
                    onComplete: () => posText.destroy()
                });

                // Boss block: damage boss on correct answer
                if (isBossBlock && this._boss && !this._boss.defeated) {
                    this._boss.takeDamage();
                    if (this._boss.defeated) {
                        // Show message that flag is now accessible
                        const unlockText = this.add.text(this._boss.x, this._boss.y - 80, '旗帜已解锁! 冲向终点!', {
                            fontSize: '16px',
                            fontFamily: 'Arial',
                            fontStyle: 'bold',
                            color: '#ffd700',
                            stroke: '#333',
                            strokeThickness: 3
                        }).setOrigin(0.5);
                        this.tweens.add({
                            targets: unlockText,
                            y: unlockText.y - 30,
                            alpha: 0,
                            duration: 2000,
                            onComplete: () => unlockText.destroy()
                        });
                    }
                }
            } else {
                this._consecutiveCorrect = 0;
                if (audioManager) audioManager.sfxWrong();
                this.spawnPenaltyEnemy(block.x, block.y);
            }
        });
    }

    collectCoin(player, coin) {
        coin.destroy();
        this.collectedCoins++;
        this.coinText.setText(this.collectedCoins.toString());
        if (audioManager) audioManager.sfxCoin();

        // Sparkle effect
        const sparkle = this.add.image(coin.x, coin.y, 'sparkle');
        this.tweens.add({
            targets: sparkle,
            alpha: 0,
            scale: 1.5,
            duration: 300,
            onComplete: () => sparkle.destroy()
        });
    }

    hitByProjectile(player, proj) {
        proj.destroy();
        player.takeDamage();
        this.updateHearts();
    }

    growPlayer() {
        if (this._playerGrown) return;
        this._playerGrown = true;
        this.player.setScale(1.5);
        // Grow back after 8 seconds
        this.time.delayedCall(8000, () => {
            if (this.player && this.player.active) {
                this.player.setScale(1);
                this._playerGrown = false;
            }
        });
        // Show growth message
        const msg = this.add.text(this.player.x, this.player.y - 50, '变大啦!', {
            fontSize: '16px', fontFamily: 'Arial', fontStyle: 'bold',
            color: '#ffd700', stroke: '#333', strokeThickness: 3
        }).setOrigin(0.5);
        this.tweens.add({
            targets: msg, y: msg.y - 30, alpha: 0, duration: 1200,
            onComplete: () => msg.destroy()
        });
    }

    touchEnemy(player, enemy) {
        // If player is jumping on top of enemy
        if (player.body.velocity.y > 0 && player.body.bottom <= enemy.body.top + 15) {
            // Stomp enemy
            enemy.destroy();
            player.setVelocityY(-250);
            if (audioManager) audioManager.sfxStomp();

            // Score popup
            const text = this.add.text(enemy.x, enemy.y - 20, '+10', {
                fontSize: '16px',
                fontFamily: 'Arial',
                color: '#ffd700',
                stroke: '#333333',
                strokeThickness: 2
            }).setOrigin(0.5);

            this.tweens.add({
                targets: text,
                y: enemy.y - 50,
                alpha: 0,
                duration: 600,
                onComplete: () => text.destroy()
            });
        } else {
            // Take damage
            player.takeDamage();
            this.updateHearts();
        }
    }

    reachFlag() {
        if (this._levelComplete) return;
        this._levelComplete = true;
        console.log('reachFlag called! Starting level complete sequence...');

        this.physics.pause();
        this.player.setVelocityX(0);
        this.player.setVelocityY(0);
        if (audioManager) audioManager.sfxLevelComplete();

        const fx = this._flagX || 400;
        const fy = this._flagY ? this._flagY - 50 : 240;

        // Victory popup
        const text = this.add.text(fx, fy - 80, '过关啦!', {
            fontSize: '24px',
            fontFamily: 'Arial',
            fontStyle: 'bold',
            color: '#ffd700',
            stroke: '#333333',
            strokeThickness: 3
        }).setOrigin(0.5);

        this.tweens.add({
            targets: text,
            scale: 1.2,
            duration: 400,
            yoyo: true,
            repeat: 2,
            onComplete: () => {
                this.scene.start('ResultScene', {
                    world: this.worldNum,
                    level: this.levelNum,
                    coins: this.collectedCoins,
                    totalCoins: this.totalCoins,
                    correct: this.correctAnswers,
                    total: this.questionsAnswered,
                    lives: this.player.lives
                });
            }
        });
    }

    updateHearts() {
        for (let i = 0; i < this.hearts.length; i++) {
            this.hearts[i].setAlpha(i < this.player.lives ? 1 : 0.2);
        }
    }

    enemyShoot(enemy) {
        if (!enemy.active) return;
        const proj = this.add.circle(enemy.x, enemy.y, 6, 0xff0000);
        proj.setDepth(5);
        this.physics.add.existing(proj);
        proj.body.setAllowGravity(false);
        const player = this.player;
        const dirX = player ? (player.x < enemy.x ? -1 : 1) : -1;
        proj.body.setVelocity(dirX * 150, -60);
        this._enemyProjectiles.add(proj);
        this.time.delayedCall(3000, () => {
            if (proj.active) proj.destroy();
        });
    }

    resetPlayer() {
        // Reset player state without restarting scene (preserves keyboard state)
        this.player.x = 80;
        this.player.y = 300;
        this.player.lives = 3;
        this.player.clearTint();
        if (this.player.body) {
            this.player.body.checkCollision.none = false;
            this.player.body.setVelocity(0, 0);
        }
        this.updateHearts();
        this.physics.resume();
        console.log('Player reset to start position');
    }

    update() {
        if (!this.player || !this.player.active) return;

        this.player.update();

        // Flag detection - requires minimum coins
        const flagX = 2600;
        const distToFlag = this._flagX ? Math.abs(this.player.x - this._flagX) : 9999;
        const minCoins = Math.max(1, Math.floor(this.totalCoins * 0.3));
        const coinGateMet = this.collectedCoins >= minCoins;

        // Boss gate: boss must be defeated for boss levels
        const bossGateMet = this.levelType !== 'boss' || (this._boss && this._boss.defeated);

        if (this.debugText) {
            this.debugText.setText('玩家:' + Math.round(this.player.x)
                + ' 旗:' + flagX
                + ' 币:' + this.collectedCoins + '/' + minCoins
                + (this.levelType === 'boss' ? ' Boss:' + (this._boss ? this._boss.hp : '?') : '')
                + ' (' + this.levelType + ')');
        }

        if (!this.flagReached && !this._levelComplete && coinGateMet && bossGateMet) {
            if (this.player.x > flagX || distToFlag < 80) {
                this.flagReached = true;
                this.reachFlag();
            }
        }

        // Enemy patrol + update (handles all 4 types directly)
        const now = this.time.now;
        const dt = this.game.loop.delta;
        this.enemies.getChildren().forEach(enemy => {
            if (!enemy.active) return;
            const eType = enemy.enemyType || 'ground';
            const range = enemy.patrolRange || 80;

            switch (eType) {
                case 'flying':
                    if (enemy.y < enemy.startY - range) {
                        enemy.body.setVelocityY(50);
                    } else if (enemy.y > enemy.startY + range) {
                        enemy.body.setVelocityY(-50);
                    } else if (Math.abs(enemy.body.velocity.y) < 1) {
                        // Restore velocity if zeroed by collision
                        enemy.body.setVelocityY(enemy._initVelY || 50);
                    }
                    break;
                case 'shooter':
                    if (enemy.x > enemy.startX + range) {
                        enemy.body.setVelocityX(-30);
                    } else if (enemy.x < enemy.startX - range) {
                        enemy.body.setVelocityX(30);
                    }
                    enemy._shootTimer -= dt;
                    if (enemy._shootTimer <= 0) {
                        this.enemyShoot(enemy);
                        enemy._shootTimer = Phaser.Math.Between(3000, 5000);
                    }
                    break;
                case 'speedy':
                    if (enemy.x > enemy.startX + range) {
                        enemy.body.setVelocityX(-80);
                        enemy.setFlipX(true);
                    } else if (enemy.x < enemy.startX - range) {
                        enemy.body.setVelocityX(80);
                        enemy.setFlipX(false);
                    }
                    break;
                default: // ground
                    if (enemy.x > enemy.startX + range) {
                        enemy.body.setVelocityX(-40);
                    } else if (enemy.x < enemy.startX - range) {
                        enemy.body.setVelocityX(40);
                    }
                    break;
            }
        });

        // Cleanup off-screen projectiles
        if (this._enemyProjectiles) {
            this._enemyProjectiles.getChildren().forEach(p => {
                if (!p.active || p.y > 600 || p.x < this.player.x - 800 || p.x > this.player.x + 900) {
                    p.destroy();
                }
            });
        }

        // Update HUD
        this.coinText.setText(this.collectedCoins.toString());
    }
}


// --- js/scenes/QuestionUI.js ---
class QuestionUI {
    constructor(scene) {
        this.scene = scene;
        this.isOpen = false;
        this.container = null;
        this.audioMgr = null;
    }

    show(questionData, onAnswer) {
        if (this.isOpen) return;
        this.isOpen = true;

        const scene = this.scene;
        const { width, height } = scene.cameras.main;

        // Pause game physics
        scene.physics.pause();

        // Ensure we have an audio manager
        if (!this.audioMgr) {
            this.audioMgr = new AudioManager();
        }

        // Dark overlay
        this.overlay = scene.add.rectangle(width / 2, height / 2, width, height, 0x000000, 0.6)
            .setScrollFactor(0).setDepth(200);

        // Container for question elements
        const elements = [];

        // Question panel background
        const panelW = 500;
        const panelH = (questionData.type === 'sentence' || questionData.type === 'spelling' || questionData.type === 'cloze') ? 440 : 300;
        const panelX = width / 2;
        const panelY = height / 2;

        const panel = scene.add.graphics().setScrollFactor(0).setDepth(201);
        panel.fillStyle(0xffffff, 0.95);
        panel.fillRoundedRect(panelX - panelW / 2, panelY - panelH / 2, panelW, panelH, 16);
        panel.lineStyle(3, 0xff69b4);
        panel.strokeRoundedRect(panelX - panelW / 2, panelY - panelH / 2, panelW, panelH, 16);
        elements.push(panel);

        // Question type badge
        const typeLabels = {
            vocabulary: '单词',
            listening: '听力',
            sentence: '句型',
            grammar: '语法',
            phonics: '语音',
            spelling: '拼写',
            cloze: '填空'
        };
        const badgeColors = {
            vocabulary: 0xffb6c1,
            listening: 0x87ceeb,
            sentence: 0xdda0dd,
            grammar: 0x90ee90,
            phonics: 0xffd700,
            spelling: 0xffa07a,
            cloze: 0xb0c4de
        };
        const badgeColor = badgeColors[questionData.type] || 0xffb6c1;
        const badge = scene.add.graphics().setScrollFactor(0).setDepth(202);
        badge.fillStyle(badgeColor);
        badge.fillRoundedRect(panelX - 38, panelY - panelH / 2 - 10, 76, 24, 6);
        const badgeText = scene.add.text(panelX, panelY - panelH / 2 + 2, typeLabels[questionData.type] || '题目', {
            fontSize: '14px',
            fontFamily: 'Arial',
            fontStyle: 'bold',
            color: '#ffffff',
            stroke: '#333',
            strokeThickness: 1
        }).setOrigin(0.5).setScrollFactor(0).setDepth(203);
        elements.push(badge, badgeText);

        // Review badge
        if (questionData.isReview) {
            const rBadge = scene.add.text(panelX + 60, panelY - panelH / 2, '复习', {
                fontSize: '12px',
                fontFamily: 'Arial',
                color: '#ff6b6b'
            }).setOrigin(0.5).setScrollFactor(0).setDepth(203);
            elements.push(rBadge);
        }

        // Question text
        const questionText = scene.add.text(panelX, panelY - 70, questionData.question, {
            fontSize: questionData.question.length > 30 ? '16px' : '20px',
            fontFamily: 'Arial',
            fontStyle: 'bold',
            color: '#333333',
            wordWrap: { width: panelW - 40 },
            align: 'center'
        }).setOrigin(0.5).setScrollFactor(0).setDepth(202);
        elements.push(questionText);

        // Sub text (phonetic or hint)
        if (questionData.questionSub) {
            const subText = scene.add.text(panelX, panelY - 45, questionData.questionSub, {
                fontSize: '13px',
                fontFamily: 'Arial',
                color: '#888888'
            }).setOrigin(0.5).setScrollFactor(0).setDepth(202);
            elements.push(subText);
        }

        // Audio button (speaker icon)
        if (questionData.audioText) {
            const speakerBtn = scene.add.text(panelX + panelW / 2 - 40, panelY - panelH / 2 + 5, '🔊', {
                fontSize: '22px'
            }).setOrigin(0.5).setScrollFactor(0).setDepth(203).setInteractive({ useHandCursor: true });

            speakerBtn.on('pointerdown', () => {
                this.audioMgr.speakWord(questionData.audioText);
                speakerBtn.setScale(1.2);
                scene.time.delayedCall(200, () => speakerBtn.setScale(1));
            });
            elements.push(speakerBtn);
        }

        // Choices
        const choiceButtons = [];
        const choiceStartY = questionData.type === 'sentence' ? panelY - 10 : panelY;

        if (questionData.type === 'sentence') {
            this.createSentenceOrderUI(scene, panelX, panelY, questionData, elements, choiceButtons, onAnswer);
        } else if (questionData.type === 'spelling') {
            this.createSpellingUI(scene, panelX, panelY, questionData, elements, choiceButtons, onAnswer);
        } else {
            // Standard multiple choice
            const choiceLabels = ['A', 'B', 'C', 'D'];
            const choiceColors = [0xff69b4, 0x87ceeb, 0xdda0dd, 0x90ee90];

            for (let i = 0; i < questionData.choices.length; i++) {
                const cy = choiceStartY + i * 44;
                const btnW = panelW - 80;
                const btnH = 36;

                const btnBg = scene.add.graphics().setScrollFactor(0).setDepth(202);
                btnBg.fillStyle(choiceColors[i], 0.2);
                btnBg.fillRoundedRect(panelX - btnW / 2, cy - btnH / 2, btnW, btnH, 8);
                btnBg.lineStyle(2, choiceColors[i]);
                btnBg.strokeRoundedRect(panelX - btnW / 2, cy - btnH / 2, btnW, btnH, 8);

                const labelText = scene.add.text(panelX - btnW / 2 + 16, cy, choiceLabels[i], {
                    fontSize: '14px',
                    fontFamily: 'Arial',
                    fontStyle: 'bold',
                    color: '#' + choiceColors[i].toString(16).padStart(6, '0')
                }).setOrigin(0, 0.5).setScrollFactor(0).setDepth(203);

                const choiceText = scene.add.text(panelX, cy, questionData.choices[i], {
                    fontSize: '15px',
                    fontFamily: 'Arial',
                    color: '#333333'
                }).setOrigin(0.5).setScrollFactor(0).setDepth(203);

                const hitZone = scene.add.zone(panelX, cy, btnW, btnH)
                    .setInteractive({ useHandCursor: true })
                    .setScrollFactor(0).setDepth(204);

                const idx = i;
                hitZone.on('pointerover', () => {
                    btnBg.clear();
                    btnBg.fillStyle(choiceColors[idx], 0.5);
                    btnBg.fillRoundedRect(panelX - btnW / 2, cy - btnH / 2, btnW, btnH, 8);
                    btnBg.lineStyle(2, choiceColors[idx]);
                    btnBg.strokeRoundedRect(panelX - btnW / 2, cy - btnH / 2, btnW, btnH, 8);
                });
                hitZone.on('pointerout', () => {
                    btnBg.clear();
                    btnBg.fillStyle(choiceColors[idx], 0.2);
                    btnBg.fillRoundedRect(panelX - btnW / 2, cy - btnH / 2, btnW, btnH, 8);
                    btnBg.lineStyle(2, choiceColors[idx]);
                    btnBg.strokeRoundedRect(panelX - btnW / 2, cy - btnH / 2, btnW, btnH, 8);
                });
                hitZone.on('pointerdown', () => {
                    this.handleAnswer(questionData, idx, onAnswer, elements, choiceButtons, panelX, panelY);
                });

                elements.push(btnBg, labelText, choiceText, hitZone);
                choiceButtons.push({ bg: btnBg, zone: hitZone, texts: [labelText, choiceText] });
            }
        }

        this.elements = elements;
        this.choiceButtons = choiceButtons;
    }

    createSentenceOrderUI(scene, panelX, panelY, questionData, elements, choiceButtons, onAnswer) {
        const words = questionData.choices;
        const cols = Math.min(words.length, 4);
        const btnW = 80;
        const btnH = 36;
        const gap = 48;
        const rows = Math.ceil(words.length / cols);

        const selectedOrder = [];
        const wordSlots = [];
        const wordButtons = [];

        // Top area: selected word slots (clickable to undo)
        const slotY = panelY - 30;
        for (let i = 0; i < words.length; i++) {
            const sx = panelX - ((words.length - 1) * gap) / 2 + i * gap;
            const slot = scene.add.graphics().setScrollFactor(0).setDepth(202);
            slot.fillStyle(0xf0f0f0, 0.5);
            slot.fillRoundedRect(sx - btnW / 2, slotY - btnH / 2, btnW, btnH, 6);
            slot.lineStyle(2, 0xcccccc, 0.5);
            slot.strokeRoundedRect(sx - btnW / 2, slotY - btnH / 2, btnW, btnH, 6);

            const slotText = scene.add.text(sx, slotY, '', {
                fontSize: '14px', fontFamily: 'Arial', fontStyle: 'bold', color: '#333333'
            }).setOrigin(0.5).setScrollFactor(0).setDepth(203);

            const hitZone = scene.add.zone(sx, slotY, btnW, btnH)
                .setInteractive({ useHandCursor: true }).setScrollFactor(0).setDepth(204);

            const slotIdx = i;
            hitZone.on('pointerdown', () => {
                if (selectedOrder.length > slotIdx) {
                    const removed = selectedOrder[slotIdx];
                    selectedOrder.splice(slotIdx, 1);
                    this.redrawSentenceSlots(wordSlots, selectedOrder);
                    if (removed.btn) {
                        removed.btn.selected = false;
                        removed.btn.bg.setAlpha(1);
                        removed.btn.text.setAlpha(1);
                        removed.btn.zone.setInteractive({ useHandCursor: true });
                    }
                }
            });

            elements.push(slot, slotText, hitZone);
            wordSlots.push({ slot, bg: slot, text: slotText, zone: hitZone, x: sx });
        }

        // Bottom area: word choices
        const choiceStartY = panelY + 40;
        for (let i = 0; i < words.length; i++) {
            const col = i % cols;
            const row = Math.floor(i / cols);
            const cx = panelX - ((cols - 1) * (btnW + 8)) / 2 + col * (btnW + 8);
            const cy = choiceStartY + row * (btnH + 8);

            const wordBg = scene.add.graphics().setScrollFactor(0).setDepth(202);
            wordBg.fillStyle(0xdda0dd, 0.3);
            wordBg.fillRoundedRect(cx - btnW / 2 + 4, cy - btnH / 2, btnW, btnH, 8);
            wordBg.lineStyle(2, 0xdda0dd);
            wordBg.strokeRoundedRect(cx - btnW / 2 + 4, cy - btnH / 2, btnW, btnH, 8);

            const wordText = scene.add.text(cx + 4, cy, words[i], {
                fontSize: '13px', fontFamily: 'Arial', fontStyle: 'bold', color: '#8b4789'
            }).setOrigin(0.5).setScrollFactor(0).setDepth(203);

            const hitZone = scene.add.zone(cx + 4, cy, btnW, btnH)
                .setInteractive({ useHandCursor: true }).setScrollFactor(0).setDepth(204);

            const wb = { bg: wordBg, text: wordText, zone: hitZone, word: words[i], selected: false };
            wordButtons.push(wb);

            hitZone.on('pointerdown', () => {
                if (wb.selected) return;
                if (selectedOrder.length >= words.length) return;
                wb.selected = true;
                selectedOrder.push({ word: words[i], btn: wb });
                this.redrawSentenceSlots(wordSlots, selectedOrder);
                wb.bg.setAlpha(0.25);
                wb.text.setAlpha(0.25);
                wb.zone.disableInteractive();
            });

            elements.push(wordBg, wordText, hitZone);
            choiceButtons.push({ bg: wordBg, zone: hitZone, texts: [wordText] });
        }

        // Confirm button - positioned below all word rows
        const lastRowY = choiceStartY + (rows - 1) * (btnH + 8);
        const confirmY = lastRowY + btnH / 2 + 28;
        const confirmW = 140;
        const confirmH = 36;
        const confirmBg = scene.add.graphics().setScrollFactor(0).setDepth(202);
        this.drawConfirmBtn(confirmBg, panelX, confirmY, confirmW, confirmH, 0x90ee90);
        const confirmText = scene.add.text(panelX, confirmY, '✓ 确认提交', {
            fontSize: '16px', fontFamily: 'Arial', fontStyle: 'bold', color: '#ffffff',
            stroke: '#333', strokeThickness: 1
        }).setOrigin(0.5).setScrollFactor(0).setDepth(203);
        const confirmZone = scene.add.zone(panelX, confirmY, confirmW, confirmH)
            .setInteractive({ useHandCursor: true }).setScrollFactor(0).setDepth(204);

        confirmZone.on('pointerover', () => this.drawConfirmBtn(confirmBg, panelX, confirmY, confirmW, confirmH, 0xa0f0a0));
        confirmZone.on('pointerout', () => this.drawConfirmBtn(confirmBg, panelX, confirmY, confirmW, confirmH, 0x90ee90));
        confirmZone.on('pointerdown', () => {
            if (selectedOrder.length === 0) return;
            const userSentence = selectedOrder.map(s => s.word).join(' ');
            const correctSentence = questionData.correctOrder.join(' ');
            const isCorrect = userSentence === correctSentence;
            this.handleAnswer(questionData, isCorrect ? 0 : -1, onAnswer, elements, choiceButtons, panelX, panelY);
        });

        elements.push(confirmBg, confirmText, confirmZone);
        choiceButtons.push({ bg: confirmBg, zone: confirmZone, texts: [confirmText] });
    }

    redrawSentenceSlots(wordSlots, selectedOrder) {
        wordSlots.forEach((slot, i) => {
            // Reset all slots
            slot.bg.clear();
            if (i < selectedOrder.length) {
                slot.text.setText(selectedOrder[i].word);
                slot.bg.fillStyle(0xdda0dd, 0.3);
                slot.bg.fillRoundedRect(slot.x - 40, slot.text.y - 18, 80, 36, 6);
                slot.bg.lineStyle(2, 0xdda0dd);
                slot.bg.strokeRoundedRect(slot.x - 40, slot.text.y - 18, 80, 36, 6);
            } else {
                slot.text.setText('');
                slot.bg.fillStyle(0xf0f0f0, 0.5);
                slot.bg.fillRoundedRect(slot.x - 40, slot.text.y - 18, 80, 36, 6);
                slot.bg.lineStyle(2, 0xcccccc, 0.5);
                slot.bg.strokeRoundedRect(slot.x - 40, slot.text.y - 18, 80, 36, 6);
            }
        });
    }

    createSpellingUI(scene, panelX, panelY, questionData, elements, choiceButtons, onAnswer) {
        const blanks = questionData.blanks;
        const letterChoices = questionData.choices;
        const panelW = 500;

        // Current filled state per blank index
        const filledState = blanks.map(b => b.filled || '');

        // Blanks display row — show each letter position as a box
        const blankSlots = [];
        const blankSize = 32;
        const blankGap = 8;
        const totalBlankW = blanks.length * blankSize + (blanks.length - 1) * blankGap;
        const blankStartX = panelX - totalBlankW / 2 + blankSize / 2;
        const blankY = panelY - 5;

        blanks.forEach((b, i) => {
            const bx = blankStartX + i * (blankSize + blankGap);

            if (b.hidden) {
                // Empty slot to fill
                const slotBg = scene.add.graphics().setScrollFactor(0).setDepth(202);
                slotBg.fillStyle(0xfff0f5);
                slotBg.fillRoundedRect(bx - blankSize / 2, blankY - blankSize / 2, blankSize, blankSize, 6);
                slotBg.lineStyle(2, 0xff69b4);
                slotBg.strokeRoundedRect(bx - blankSize / 2, blankY - blankSize / 2, blankSize, blankSize, 6);

                const slotText = scene.add.text(bx, blankY, filledState[i] || '', {
                    fontSize: '18px', fontFamily: 'Arial', fontStyle: 'bold', color: '#ff69b4'
                }).setOrigin(0.5).setScrollFactor(0).setDepth(203);

                const hitZone = scene.add.zone(bx, blankY, blankSize + 4, blankSize + 4)
                    .setInteractive({ useHandCursor: true }).setScrollFactor(0).setDepth(204);

                const slotIdx = i;
                hitZone.on('pointerdown', () => {
                    if (filledState[slotIdx]) {
                        // Undo: remove letter from this slot
                        filledState[slotIdx] = '';
                        slotText.setText('');
                        // Re-enable the letter button if it was used
                        choiceButtons.forEach(cb => {
                            if (cb.letter === blanks[slotIdx].letter && cb.used) {
                                cb.used = false;
                                if (cb.bg) cb.bg.setAlpha(1);
                                if (cb.text) cb.text.setAlpha(1);
                                if (cb.zone) cb.zone.setInteractive({ useHandCursor: true });
                            }
                        });
                        // Update all letter buttons' used state
                        this._updateLetterUsedState(choiceButtons, filledState, blanks);
                    }
                });

                elements.push(slotBg, slotText, hitZone);
                blankSlots.push({ bg: slotBg, text: slotText, zone: hitZone, index: i, hidden: true });
            } else {
                // Pre-filled letter (given)
                const slotBg = scene.add.graphics().setScrollFactor(0).setDepth(202);
                slotBg.fillStyle(0xf0f0f0);
                slotBg.fillRoundedRect(bx - blankSize / 2, blankY - blankSize / 2, blankSize, blankSize, 6);
                slotBg.lineStyle(1, 0xcccccc);
                slotBg.strokeRoundedRect(bx - blankSize / 2, blankY - blankSize / 2, blankSize, blankSize, 6);

                const slotText = scene.add.text(bx, blankY, b.letter, {
                    fontSize: '18px', fontFamily: 'Arial', fontStyle: 'bold', color: '#999999'
                }).setOrigin(0.5).setScrollFactor(0).setDepth(203);

                elements.push(slotBg, slotText);
                blankSlots.push({ bg: slotBg, text: slotText, index: i, hidden: false });
            }
        });

        // Letter choice buttons below the blanks
        const letterBtnSize = 34;
        const letterGap = 6;
        const letterCols = Math.min(letterChoices.length, 8);
        const letterRows = Math.ceil(letterChoices.length / letterCols);
        const letterStartY = blankY + 40;

        letterChoices.forEach((letter, i) => {
            const col = i % letterCols;
            const row = Math.floor(i / letterCols);
            const lx = panelX - ((letterCols - 1) * (letterBtnSize + letterGap)) / 2 + col * (letterBtnSize + letterGap);
            const ly = letterStartY + row * (letterBtnSize + letterGap);

            const btnBg = scene.add.graphics().setScrollFactor(0).setDepth(202);
            btnBg.fillStyle(0xffb6c1, 0.3);
            btnBg.fillRoundedRect(lx - letterBtnSize / 2, ly - letterBtnSize / 2, letterBtnSize, letterBtnSize, 6);
            btnBg.lineStyle(2, 0xff69b4);
            btnBg.strokeRoundedRect(lx - letterBtnSize / 2, ly - letterBtnSize / 2, letterBtnSize, letterBtnSize, 6);

            const letterText = scene.add.text(lx, ly, letter.toUpperCase(), {
                fontSize: '16px', fontFamily: 'Arial', fontStyle: 'bold', color: '#ff1493'
            }).setOrigin(0.5).setScrollFactor(0).setDepth(203);

            const hitZone = scene.add.zone(lx, ly, letterBtnSize + 4, letterBtnSize + 4)
                .setInteractive({ useHandCursor: true }).setScrollFactor(0).setDepth(204);

            const cb = { bg: btnBg, text: letterText, zone: hitZone, letter: letter, used: false };
            choiceButtons.push(cb);

            hitZone.on('pointerdown', () => {
                if (cb.used) return;
                // Find first empty hidden blank
                const emptyIdx = blanks.findIndex((b, bi) => b.hidden && !filledState[bi]);
                if (emptyIdx === -1) return;
                filledState[emptyIdx] = letter;
                cb.used = true;
                btnBg.setAlpha(0.2);
                letterText.setAlpha(0.2);
                hitZone.disableInteractive();

                // Update blank slot display
                const targetSlot = blankSlots.find(s => s.index === emptyIdx && s.hidden);
                if (targetSlot) targetSlot.text.setText(letter.toUpperCase());

                // Auto-check if all blanks filled
                if (blanks.every((b, bi) => !b.hidden || filledState[bi])) {
                    const userWord = blanks.map((b, bi) =>
                        b.hidden ? filledState[bi].toLowerCase() : b.letter
                    ).join('');
                    const isCorrect = userWord === questionData.correctAnswer;
                    this.handleAnswer(questionData, isCorrect ? 0 : -1, onAnswer, elements, choiceButtons, panelX, panelY);
                }
            });

            elements.push(btnBg, letterText, hitZone);
        });

        // Clear button
        const clearY = letterStartY + letterRows * (letterBtnSize + letterGap) + 14;
        const clearBtnW = 100;
        const clearBtnH = 30;
        const clearBg = scene.add.graphics().setScrollFactor(0).setDepth(202);
        clearBg.fillStyle(0xffb6b6, 0.4);
        clearBg.fillRoundedRect(panelX - clearBtnW / 2, clearY - clearBtnH / 2, clearBtnW, clearBtnH, 8);
        clearBg.lineStyle(1, 0xff6b6b);
        clearBg.strokeRoundedRect(panelX - clearBtnW / 2, clearY - clearBtnH / 2, clearBtnW, clearBtnH, 8);

        const clearText = scene.add.text(panelX, clearY, '全部清除', {
            fontSize: '13px', fontFamily: 'Arial', color: '#ff6b6b'
        }).setOrigin(0.5).setScrollFactor(0).setDepth(203);

        const clearZone = scene.add.zone(panelX, clearY, clearBtnW, clearBtnH)
            .setInteractive({ useHandCursor: true }).setScrollFactor(0).setDepth(204);

        clearZone.on('pointerdown', () => {
            // Reset all fills
            blanks.forEach((b, i) => { if (b.hidden) filledState[i] = ''; });
            blankSlots.forEach(s => { if (s.hidden) s.text.setText(''); });
            choiceButtons.forEach(cb => {
                if (cb.letter !== undefined) {
                    cb.used = false;
                    if (cb.bg) cb.bg.setAlpha(1);
                    if (cb.text) cb.text.setAlpha(1);
                    if (cb.zone) cb.zone.setInteractive({ useHandCursor: true });
                }
            });
            this._updateLetterUsedState(choiceButtons, filledState, blanks);
        });

        elements.push(clearBg, clearText, clearZone);
    }

    _updateLetterUsedState(choiceButtons, filledState, blanks) {
        // Reset all letter buttons
        choiceButtons.forEach(cb => {
            if (cb.letter !== undefined) {
                cb.used = false;
                if (cb.bg) cb.bg.setAlpha(1);
                if (cb.text) cb.text.setAlpha(1);
                if (cb.zone) cb.zone.setInteractive({ useHandCursor: true });
            }
        });
        // Mark used ones based on filledState
        const usedLetters = [];
        blanks.forEach((b, i) => {
            if (b.hidden && filledState[i]) usedLetters.push(filledState[i]);
        });
        // Simple matching: mark first unused instance of each used letter
        const remaining = [...usedLetters];
        choiceButtons.forEach(cb => {
            if (cb.letter !== undefined && remaining.includes(cb.letter)) {
                const idx = remaining.indexOf(cb.letter);
                remaining.splice(idx, 1);
                cb.used = true;
                if (cb.bg) cb.bg.setAlpha(0.2);
                if (cb.text) cb.text.setAlpha(0.2);
                if (cb.zone) cb.zone.disableInteractive();
            }
        });
    }

    drawConfirmBtn(gfx, x, y, w, h, color) {
        gfx.clear();
        gfx.fillStyle(color, 0.9);
        gfx.fillRoundedRect(x - w / 2, y - h / 2, w, h, 10);
        gfx.lineStyle(2, 0xffffff);
        gfx.strokeRoundedRect(x - w / 2, y - h / 2, w, h, 10);
    }

    handleAnswer(questionData, userIndex, onAnswer, elements, choiceButtons, panelX, panelY) {
        // Disable all choice buttons
        if (choiceButtons) {
            choiceButtons.forEach(btn => {
                if (btn.zone) btn.zone.disableInteractive();
            });
        }

        // For spelling, correct is determined by the passed userIndex (0 = correct, -1 = wrong)
        const correct = questionData.type === 'spelling'
            ? (userIndex === 0)
            : (userIndex === questionData.correctIndex);
        const scene = this.scene;

        // Show feedback
        const feedbackText = scene.add.text(panelX, panelY - 130, correct ? '✓ 正确!' : '✗ 再想想~', {
            fontSize: '22px',
            fontFamily: 'Arial',
            fontStyle: 'bold',
            color: correct ? '#4caf50' : '#ff6b6b',
            stroke: '#ffffff',
            strokeThickness: 3
        }).setOrigin(0.5).setScrollFactor(0).setDepth(205);

        // Show correct answer if wrong
        if (!correct && questionData.correctAnswer) {
            const correctText = scene.add.text(panelX, panelY - 105, `正确答案：${questionData.correctAnswer}`, {
                fontSize: '14px',
                fontFamily: 'Arial',
                color: '#4caf50'
            }).setOrigin(0.5).setScrollFactor(0).setDepth(205);
            elements.push(correctText);
        }

        // Explanation
        if (questionData.explain && !correct) {
            const explainText = scene.add.text(panelX, panelY - 85, questionData.explain, {
                fontSize: '12px',
                fontFamily: 'Arial',
                color: '#666666',
                wordWrap: { width: 400 },
                align: 'center'
            }).setOrigin(0.5).setScrollFactor(0).setDepth(205);
            elements.push(explainText);
        }

        elements.push(feedbackText);

        // For sentence type, add follow-along reading button
        if (correct && questionData.type === 'sentence' && questionData.audioText) {
            const delay = 600;
            scene.time.delayedCall(delay, () => {
                const readBtnY = panelY + 140;
                const readBtnW = 180;
                const readBtnH = 36;

                const readBg = scene.add.graphics().setScrollFactor(0).setDepth(205);
                readBg.fillStyle(0x87ceeb, 0.8);
                readBg.fillRoundedRect(panelX - readBtnW / 2, readBtnY - readBtnH / 2, readBtnW, readBtnH, 10);
                readBg.lineStyle(2, 0xffffff);
                readBg.strokeRoundedRect(panelX - readBtnW / 2, readBtnY - readBtnH / 2, readBtnW, readBtnH, 10);

                const readText = scene.add.text(panelX, readBtnY, '🔊 听发音跟读', {
                    fontSize: '16px',
                    fontFamily: 'Arial',
                    fontStyle: 'bold',
                    color: '#ffffff'
                }).setOrigin(0.5).setScrollFactor(0).setDepth(206);

                const readZone = scene.add.zone(panelX, readBtnY, readBtnW, readBtnH)
                    .setInteractive({ useHandCursor: true }).setScrollFactor(0).setDepth(207);

                elements.push(readBg, readText, readZone);

                let reading = false;
                readZone.on('pointerdown', () => {
                    if (reading) return;
                    reading = true;

                    // First speak the sentence
                    if (!this.audioMgr) this.audioMgr = new AudioManager();
                    this.audioMgr.speakSentence(questionData.audioText);

                    readText.setText('🎤 请跟读...');
                    readBg.clear();
                    readBg.fillStyle(0xdda0dd, 0.8);
                    readBg.fillRoundedRect(panelX - readBtnW / 2, readBtnY - readBtnH / 2, readBtnW, readBtnH, 10);
                    readBg.lineStyle(2, 0xffffff);
                    readBg.strokeRoundedRect(panelX - readBtnW / 2, readBtnY - readBtnH / 2, readBtnW, readBtnH, 10);

                    // Wait for TTS then start recognition
                    scene.time.delayedCall(1500, () => {
                        this.audioMgr.listenAndCompare(questionData.audioText, (result) => {
                            readText.setText(result.message);
                            readBg.clear();
                            const resultColor = result.passed ? 0x90ee90 : 0xffb6b1;
                            readBg.fillStyle(resultColor, 0.8);
                            readBg.fillRoundedRect(panelX - readBtnW / 2, readBtnY - readBtnH / 2, readBtnW + 40, Math.min(readBtnH + 10, 50), 10);
                            readZone.disableInteractive();

                            // Close after delay
                            scene.time.delayedCall(1500, () => {
                                this.hide();
                                if (onAnswer) onAnswer(correct);
                            });
                        });
                    });
                });

                // Also provide a skip button
                const skipText = scene.add.text(panelX, readBtnY + 28, '跳过跟读', {
                    fontSize: '12px',
                    fontFamily: 'Arial',
                    color: '#aaa'
                }).setOrigin(0.5).setScrollFactor(0).setDepth(206)
                    .setInteractive({ useHandCursor: true });

                skipText.on('pointerdown', () => {
                    this.hide();
                    if (onAnswer) onAnswer(correct);
                });
                elements.push(skipText);
            });
        } else {
            // Close after delay for non-sentence or wrong answers
            scene.time.delayedCall(correct ? 800 : 1800, () => {
                this.hide();
                if (onAnswer) onAnswer(correct);
            });
        }
    }

    hide() {
        this.isOpen = false;

        // Destroy all elements
        if (this.elements) {
            this.elements.forEach(el => {
                if (el && el.destroy) el.destroy();
            });
            this.elements = [];
        }

        if (this.overlay) {
            this.overlay.destroy();
            this.overlay = null;
        }

        this.choiceButtons = [];

        // Resume physics
        this.scene.physics.resume();
    }
}


// --- js/scenes/ResultScene.js ---
class ResultScene extends Phaser.Scene {
    constructor() {
        super({ key: 'ResultScene' });
    }

    init(data) {
        this.worldNum = data.world || 1;
        this.levelNum = data.level || 1;
        this.coins = data.coins || 0;
        this.totalCoins = data.totalCoins || 0;
        this.correct = data.correct || 0;
        this.total = data.total || 0;
        this.lives = data.lives || 0;
    }

    create() {
        const { width, height } = this.cameras.main;

        // Background
        const bg = this.add.graphics();
        bg.fillGradientStyle(0x1a1a2e, 0x1a1a2e, 0x2d1b4e, 0x2d1b4e, 1);
        bg.fillRect(0, 0, width, height);

        // Stars based on performance
        const ratio = this.totalCoins > 0 ? this.coins / Math.max(this.totalCoins, 1) : 0;
        const starCount = ratio >= 0.8 ? 3 : ratio >= 0.5 ? 2 : 1;

        // Title
        this.add.text(width / 2, 50, '关卡完成!', {
            fontSize: '36px',
            fontFamily: 'Arial',
            fontStyle: 'bold',
            color: '#ffd700',
            stroke: '#333333',
            strokeThickness: 3
        }).setOrigin(0.5);

        // Stars
        for (let i = 0; i < 3; i++) {
            const starX = width / 2 - 60 + i * 60;
            const star = this.add.image(starX, 120, 'star').setScale(i < starCount ? 2 : 1);
            if (i < starCount) {
                star.setAlpha(0);
                this.tweens.add({
                    targets: star,
                    alpha: 1,
                    scale: 2,
                    duration: 400,
                    delay: i * 300 + 300,
                    ease: 'Back.easeOut'
                });
            } else {
                star.setAlpha(0.3);
                star.setTint(0x666666);
            }
        }

        // Stats
        const statsY = 180;
        this.add.text(width / 2, statsY, `金币: ${this.coins}  |  答题: ${this.correct}/${this.total}`, {
            fontSize: '20px',
            fontFamily: 'Arial',
            color: '#ffffff'
        }).setOrigin(0.5);

        this.add.text(width / 2, statsY + 30, `正确率: ${this.total > 0 ? Math.round(this.correct / this.total * 100) : 0}%  |  生命: ${'♥'.repeat(this.lives)}`, {
            fontSize: '16px',
            fontFamily: 'Arial',
            color: '#ffb6c1'
        }).setOrigin(0.5);

        // Next level button
        const btnY = 280;
        const btn = this.add.graphics();
        btn.fillStyle(0x90ee90);
        btn.fillRoundedRect(width / 2 - 80, btnY - 22, 160, 44, 10);

        const nextLevel = this.levelNum < 4
            ? `下一关 →`
            : '返回地图';

        this.add.text(width / 2, btnY, nextLevel, {
            fontSize: '20px',
            fontFamily: 'Arial',
            fontStyle: 'bold',
            color: '#333333'
        }).setOrigin(0.5);

        const btnZone = this.add.zone(width / 2, btnY, 160, 44).setInteractive({ useHandCursor: true });

        btnZone.on('pointerover', () => {
            btn.clear();
            btn.fillStyle(0xa0f0a0);
            btn.fillRoundedRect(width / 2 - 80, btnY - 22, 160, 44, 10);
        });

        btnZone.on('pointerout', () => {
            btn.clear();
            btn.fillStyle(0x90ee90);
            btn.fillRoundedRect(width / 2 - 80, btnY - 22, 160, 44, 10);
        });

        btnZone.on('pointerdown', () => {
            // Save progress
            if (!progressManager) progressManager = new ProgressManager();
            const ratio = this.totalCoins > 0 ? this.coins / Math.max(this.totalCoins, 1) : 0;
            const stars = ratio >= 0.8 ? 3 : ratio >= 0.5 ? 2 : 1;
            // Map level number to progress key (4 = 'boss')
            const levelKey = this.levelNum >= 4 ? 'boss' : this.levelNum;
            progressManager.completeLevel(this.worldNum, levelKey, stars);

            // Determine next level
            const levelTypes = ['vocabulary', 'sentence', 'grammar', 'boss'];
            const nextLevel = this.levelNum < 4 ? this.levelNum + 1 : null;
            const nextType = nextLevel ? levelTypes[nextLevel - 1] : null;

            if (nextLevel) {
                this.scene.start('GameScene', {
                    world: this.worldNum,
                    level: nextLevel,
                    type: nextType
                });
            } else {
                this.scene.start('WorldSelectScene');
            }
        });

        // Replay button
        const replayY = 340;
        this.add.text(width / 2, replayY, '重新挑战', {
            fontSize: '16px',
            fontFamily: 'Arial',
            color: '#aaa'
        }).setOrigin(0.5).setInteractive({ useHandCursor: true })
            .on('pointerover', function () { this.setColor('#fff'); })
            .on('pointerout', function () { this.setColor('#aaa'); })
            .on('pointerdown', () => {
                this.scene.start('GameScene', {
                    world: this.worldNum,
                    level: this.levelNum,
                    type: 'vocabulary'
                });
            });

        // Particle celebration
        for (let i = 0; i < 20; i++) {
            const px = Phaser.Math.Between(50, width - 50);
            const py = Phaser.Math.Between(50, height - 50);
            const sparkle = this.add.image(px, py, 'sparkle').setAlpha(0).setScale(0.5);
            this.tweens.add({
                targets: sparkle,
                alpha: 0.8,
                scale: 1,
                duration: 800,
                delay: i * 100,
                yoyo: true,
                onComplete: () => sparkle.destroy()
            });
        }

        this.cameras.main.fadeIn(500);
    }
}
